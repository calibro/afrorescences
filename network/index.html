			<script type="application/json" data-sveltekit-fetched data-url="/afrorescences/api/data">{"status":200,"statusText":"","headers":{},"body":"{\"people\":[{\"name\":{\"value\":\"Ibrahim\"},\"surname\":{\"value\":\"Meïté Sikely\"},\"roles\":{\"value\":[\"Artiste\"],\"translation\":{\"fr\":[\"Artiste\"],\"en\":[\"Artist\"]}},\"activities\":{\"value\":[\"peinture\"],\"translation\":{\"fr\":[\"peinture\"],\"en\":[\"painting\"]}},\"birthYear\":{\"value\":\"1996-01-01T00:00:00.000Z\"},\"citiesOfActivity\":{\"value\":[\"Paris\",\"Champigny-sur-Marne\"]},\"placesOfFormation\":{\"value\":[\"Villa Arson Nice\",\"ENSBA Paris\"]},\"link\":{\"value\":\"https://galerieannebarrault.com/artiste/ibrahim-meite-sikely/\"},\"biography\":{\"value\":\"Ibrahim Meïté Sikely est peintre. Son travail a été montré dans plusieurs centres d’art en Île-de-France et dans d’autres régions du territoire. \\n\\nLa peinture d’Ibrahim, très colorée et chatoyante, intègre des éléments visuels de la culture pop contemporaine aussi bien que des références à des sources plus anciennes de la peinture baroque.\\n\\nCertains de ses tableaux montrent ses personnages dans des décors ornementés et ciels troublants, que l’on retrouve dans la peinture européenne des 17e et 18 e  siècles, mais il y intègre aussi des onomatopées, des bulles et de la parole, ainsi que des codes graphiques provenant de mangas et bandes dessinées de superhéros, comme ceux de Dragon Ball ou de Marvel. Il montre ainsi directement, dans sa peinture, les sources et univers qui l’ont inspiré. Une autre dimension importante du travail d’Ibrahim est l’autobiographie, ou du moins l’autoreprésentation : ses personnages sont très souvent des proches, ami.es d’enfance, pairs artistes ou membres de sa famille, qu’il place ainsi souvent en position de héros : héros du tableau, héros d’un territoire imaginaire, hybridant l’Île-de-France et les cartes de jeux vidéos.\\n\\nLes collaborations d’Ibrahim en cadre institutionnel, comme les centres d’art contemporain ou les expositions en musée, accueillent des temps de médiation et de rencontre auprès de publics jeunes ou scolaires.\\n\\nSources :\\n\\nGalerie Anne Barrault. « Ibrahim Meïté Sikely ». Page consultée le 16 mai 2025. https://galerieannebarrault.com/artiste/ibrahim-meite-sikely/\\n\\nCentre d’art contemporain d’intérêt national. « À Ambroise Et Aziza  Neïla Czermak Ichti Et Ibrahim Meïté Sikely ». Page consultée le 16 mai 2025.  https://www.cacbretigny.com/fr/exhibitions/503-a-ambroise-et-aziza-neila-czermak-ichti-et-ibrahim-meite-sikely\",\"translation\":{\"fr\":\"Ibrahim Meïté Sikely est peintre. Son travail a été montré dans plusieurs centres d’art en Île-de-France et dans d’autres régions du territoire. \\n\\nLa peinture d’Ibrahim, très colorée et chatoyante, intègre des éléments visuels de la culture pop contemporaine aussi bien que des références à des sources plus anciennes de la peinture baroque.\\n\\nCertains de ses tableaux montrent ses personnages dans des décors ornementés et ciels troublants, que l’on retrouve dans la peinture européenne des 17e et 18 e  siècles, mais il y intègre aussi des onomatopées, des bulles et de la parole, ainsi que des codes graphiques provenant de mangas et bandes dessinées de superhéros, comme ceux de Dragon Ball ou de Marvel. Il montre ainsi directement, dans sa peinture, les sources et univers qui l’ont inspiré. Une autre dimension importante du travail d’Ibrahim est l’autobiographie, ou du moins l’autoreprésentation : ses personnages sont très souvent des proches, ami.es d’enfance, pairs artistes ou membres de sa famille, qu’il place ainsi souvent en position de héros : héros du tableau, héros d’un territoire imaginaire, hybridant l’Île-de-France et les cartes de jeux vidéos.\\n\\nLes collaborations d’Ibrahim en cadre institutionnel, comme les centres d’art contemporain ou les expositions en musée, accueillent des temps de médiation et de rencontre auprès de publics jeunes ou scolaires.\\n\\nSources :\\n\\nGalerie Anne Barrault. « Ibrahim Meïté Sikely ». Page consultée le 16 mai 2025. https://galerieannebarrault.com/artiste/ibrahim-meite-sikely/\\n\\nCentre d’art contemporain d’intérêt national. « À Ambroise Et Aziza  Neïla Czermak Ichti Et Ibrahim Meïté Sikely ». Page consultée le 16 mai 2025.  https://www.cacbretigny.com/fr/exhibitions/503-a-ambroise-et-aziza-neila-czermak-ichti-et-ibrahim-meite-sikely\",\"en\":\"Ibrahim Meïté Sikely is a painter whose work has been exhibited in art centres throughout the Île-de-France region and across the country. His colourful and vibrant paintings incorporate visual elements from contemporary pop culture as well as references to older sources of Baroque painting.\\nSome of Sikely’s paintings depict characters situated within moody, atmospheric landscapes reminiscent of 17th- and 18th-century European paintings while simultaneously incorporating onomatopoeia, speech bubbles, dialogue and graphic codes from manga and superhero comics, such as\\nDragon Ball or Marvel. In this way, Sikely transparently acknowledges the sources and worlds that have inspired him. Another important dimension of his work is autobiography and self-representation: His characters are very often close friends, childhood friends, fellow artists or family members,\\nwhom he frequently places in heroic roles. They become heroes of an imaginary territory blending the Île-de-France region and video game maps.\\nSikely collaborates with institutions such as contemporary art centres or museums to facilitate educational programs and engagement activities for young audiences and school groups.\\n\\nSources consulted: \\n\\nAnne Barrault Gallery. “Ibrahim Meïté Sikely.” Accessed May 16, 2025. \\ngalerieannebarrault.com/artiste/ibrahim-meite-sikely.\\n\\nCentre d’art contemporain d’intérêt national. “À Ambroise et\\nAziza Neïla Czermak Ichti et Ibrahim Meïté Sikely.” Accessed on May 16, 2025. \\ncacbretigny.com/fr/exhibitions/503-a-ambroise-et-aziza-neila-czermak-ichti-et-ibrahim-meite-sikely\"}},\"id\":{\"value\":\"P7\"},\"interviewEvents\":{\"value\":[\"Signal\",\"Art Basel Paris 2025\",\"Je deviendrai ce que j'aurais dû être\"]},\"interviewFavorites\":{\"value\":\"John Sayles, The Brother from Another Planet, 1984 (film)\\n\\nCyberpunk 2077, 2020 (jeu vidéo)\\n\\nEugène Mcdaniels, The Parasite, 1971 (musique)\\n\",\"translation\":{\"fr\":\"John Sayles, The Brother from Another Planet, 1984 (film)\\n\\nCyberpunk 2077, 2020 (jeu vidéo)\\n\\nEugène Mcdaniels, The Parasite, 1971 (musique)\\n\",\"en\":\"John Sayles, The Brother from Another Planet, 1984 (film)\\n\\nCyberpunk 2077, 2020 (video game)\\n\\nEugene McDaniels, The Parasite (for Buffy), 1971 (song, music)\"}},\"interviewQuestion\":{\"value\":\"Comment réussir à recréer de nouvelles intrigues et mythologies contemporaines à partir de l’imaginaire en gardant un regard et une touche turbulente ? En recherche d’une peinture bruyante ?\",\"translation\":{\"fr\":\"Comment réussir à recréer de nouvelles intrigues et mythologies contemporaines à partir de l’imaginaire en gardant un regard et une touche turbulente ? En recherche d’une peinture bruyante ?\",\"en\":\"How can one successfully draw on existing imaginaries to create once again new narratives and contemporary mythologies while maintaining a disruptive perspective and touch? In search of a noisy painting practice?\"}},\"credits\":{\"value\":\"Vue de l’œuvre Souvenir d’un été à la cité/WHAT YA HOOD LIKE IS IT ROHFF?? 2020-2026.\",\"translation\":{\"fr\":\"Vue de l’œuvre Souvenir d’un été à la cité/WHAT YA HOOD LIKE IS IT ROHFF?? 2020-2026.\",\"en\":\"View of the work Memory of a summer in the city/WHAT YA HOOD LIKE IS IT ROHFF?? 2020-2026.\"}}},{\"name\":{\"value\":\"Inès \"},\"surname\":{\"value\":\"Di Folco Jemni\"},\"roles\":{\"value\":[\"Artiste\"],\"translation\":{\"fr\":[\"Artiste\"],\"en\":[\"Artist\"]}},\"activities\":{\"value\":[\"peinture\",\"performance\"],\"translation\":{\"fr\":[\"peinture\",\"performance\"],\"en\":[\"painting\",\"performance\"]}},\"birthYear\":{\"value\":\"1993-01-01T00:00:00.000Z\"},\"citiesOfActivity\":{\"value\":[\"Paris\"]},\"placesOfFormation\":{\"value\":[\"ENSBA Paris\"]},\"link\":{\"value\":\"https://sissi-club.com/ines-di-folco-jemn\"},\"biography\":{\"value\":\"Inès Di Folco Jemni est peintre et musicienne. Elle peint le plus souvent sur des toiles et étoffes libres, c’est-à-dire sans châssis pour tendre et délimiter le support. Elle s’appuie sur une palette chromatique très vaste, et ses peintures peuvent être tour à tour dans des tons verts, rouges, des bleus, des bruns, des ocres… \\n\\nElle représente des personnages et univers qui paraissent oniriques, presque floutés et vitreux comme dans un rêve. Cela tient à son geste pictural, qui consiste à souvent laisser couler et expérimenter avec la matière et les médiums, mais aussi à la diversité de matériaux qu’elle utilise: peinture diluée, encres, vernis argentés, poudre libre…\\nSes images sont inspirées de représentations mentales, mais aussi d’imageries de la culture populaire, et de photographies d’archives familiales. Elles représentent le plus souvent des femmes, de tous âges, et de différentes époques, dans des scènes de maternité ou d’introspection. \\n\\nSon travail est fortement marqué par la thématique de l’eau ou du cours d’eau : références à un espace méditerranéen ou caribéen, coulées de la peinture sur la toile, représentations de la toilette… Ses toiles deviennent ainsi des lieux bordés par plusieurs géographies des Suds globaux qui dialoguent entre elles, court-circuitant une vision européano-centrée du monde.\\n\\nLa pratique d’Inès Di Folco Jemni passe également par des moments de transmission, lors d’ateliers auprès de publics jeunes.\\n\\n\\nSources :\\n\\nBoittiaux, Inès. « Les magasins généraux révèlent les mondes enchanteurs d’Inès Di Folco Jemni » . Beaux Arts, 7 mars 2024. Page consultée le 27 juillet 2025. https://www.beauxarts.com/expos/les-magasins-generaux-revelent-les-mondes-enchanteurs-dines-di-folco-jemni/\\n\\nMagasins Généraux. « Inès Di Folco Jemni : Le salon des songes » . Page consultée le 27 juillet 2025. \\nhttps://magasinsgeneraux.com/exposition/ines-di-folco-jemni/\",\"translation\":{\"fr\":\"Inès Di Folco Jemni est peintre et musicienne. Elle peint le plus souvent sur des toiles et étoffes libres, c’est-à-dire sans châssis pour tendre et délimiter le support. Elle s’appuie sur une palette chromatique très vaste, et ses peintures peuvent être tour à tour dans des tons verts, rouges, des bleus, des bruns, des ocres… \\n\\nElle représente des personnages et univers qui paraissent oniriques, presque floutés et vitreux comme dans un rêve. Cela tient à son geste pictural, qui consiste à souvent laisser couler et expérimenter avec la matière et les médiums, mais aussi à la diversité de matériaux qu’elle utilise: peinture diluée, encres, vernis argentés, poudre libre…\\nSes images sont inspirées de représentations mentales, mais aussi d’imageries de la culture populaire, et de photographies d’archives familiales. Elles représentent le plus souvent des femmes, de tous âges, et de différentes époques, dans des scènes de maternité ou d’introspection. \\n\\nSon travail est fortement marqué par la thématique de l’eau ou du cours d’eau : références à un espace méditerranéen ou caribéen, coulées de la peinture sur la toile, représentations de la toilette… Ses toiles deviennent ainsi des lieux bordés par plusieurs géographies des Suds globaux qui dialoguent entre elles, court-circuitant une vision européano-centrée du monde.\\n\\nLa pratique d’Inès Di Folco Jemni passe également par des moments de transmission, lors d’ateliers auprès de publics jeunes.\\n\\n\\nSources :\\n\\nBoittiaux, Inès. « Les magasins généraux révèlent les mondes enchanteurs d’Inès Di Folco Jemni » . Beaux Arts, 7 mars 2024. Page consultée le 27 juillet 2025. https://www.beauxarts.com/expos/les-magasins-generaux-revelent-les-mondes-enchanteurs-dines-di-folco-jemni/\\n\\nMagasins Généraux. « Inès Di Folco Jemni : Le salon des songes » . Page consultée le 27 juillet 2025. \\nhttps://magasinsgeneraux.com/exposition/ines-di-folco-jemni/\",\"en\":\"Inès Di Folco Jemni is both a painter and a musician. She usually paints on canvases and fabrics that are loose rather than stretched over a frame. Her broad colour palette often features shades of green, red, blue, brown and ochre. \\n\\nShe depicts surreal characters and dreamlike worlds that appear blurred and glassy. She achieves this effect by allowing paint to flow freely, experimenting with a variety of materials and mediums, including diluted paint, inks, silver varnishes and loose powder. She draws from her own mental representations as well as from imagery from popular culture and family archive photographs. Most often, her paintings depict women of all ages and eras in scenes of motherhood or introspection. \\n\\nWater and waterways are recurring themes in her work. Paint drips on the canvas may evoke the Mediterranean or Caribbean, or scenes of bathing. In this way, her canvases become sites where several geographies of the Global South intersect, challenging Eurocentric perspectives.\\n\\nInès also enjoys inspiring and engaging with others, particularly through workshops with young audiences.\\n\\nSources consulted: \\n\\nBoittiaux, Inès. “Les magasins généraux révèlent les mondes enchanteurs d’Inès Di Folco Jemni.” Beaux Arts, March 7, 2024. Accessed July 27, 2025. \\nbeauxarts.com/expos/les-magasins-generaux-revelent-les-mondes-enchanteurs-dines-di-folco-jemni \\n\\nMagasins Généraux. “Inès Di Folco Jemni : Le salon des songes. » Accessed July 27, 2025. \\nmagasinsgeneraux.com/exposition/ines-di-folco-jemni.\\n\\n\"}},\"id\":{\"value\":\"P9\"},\"interviewEvents\":{\"value\":[\"Le salon des songes\",\"Tituba, qui pour nous protéger?\",\"Elixir\"]},\"interviewFavorites\":{\"value\":\"Lydia Cabrera, El Monte, 1954 (livre)\\n\\nToni Morrison, Sula, 1973 (livre)\\n\\nSouleymane Cissé, Yeleen, 1987 (film)\\n\\nRené Depestres, Hadriana dans tous mes rêves, 1988 (livre)\",\"translation\":{\"fr\":\"Lydia Cabrera, El Monte, 1954 (livre)\\n\\nToni Morrison, Sula, 1973 (livre)\\n\\nSouleymane Cissé, Yeleen, 1987 (film)\\n\\nRené Depestres, Hadriana dans tous mes rêves, 1988 (livre)\",\"en\":\"Lydia Cabrera. El Monte, 1954 (book)\\nToni Morrison. Sula, 1973 (book)\\nSouleymane Cissé. Yeleen, 1987 (film)\\nRené Depestres. Hadriana dans tous mes rêves, 1988 (book)\"}},\"interviewQuestion\":{\"value\":\"Comment retranscrire en peinture les visions et la sensualité, les sens et les présences invisibles ?\",\"translation\":{\"fr\":\"Comment retranscrire en peinture les visions et la sensualité, les sens et les présences invisibles ?\",\"en\":\"How can painting transcribe visions and sensuality, as well as the senses and the invisible?\"}},\"credits\":{\"value\":\"Vue de l’œuvre Blues, 2015, peinture à l’huile sur toile, 200 X 300 cm.\",\"translation\":{\"fr\":\"Vue de l’œuvre Blues, 2015, peinture à l’huile sur toile, 200 X 300 cm.\",\"en\":\"View of the work Blues, 2015, oil on canvas, 200 X 300 cm.\"}}},{\"name\":{\"value\":\"Attandi\"},\"surname\":{\"value\":\"Trawalley\"},\"roles\":{\"value\":[\"Artiste\"],\"translation\":{\"fr\":[\"Artiste\"],\"en\":[\"Artist\"]}},\"activities\":{\"value\":[\"installation\",\"textile\",\"performance\",\"sculpture\"],\"translation\":{\"fr\":[\"installation\",\"textile\",\"performance\",\"sculpture\"],\"en\":[\"installation\",\"textile\",\"performance\",\"sculpture\"]}},\"birthYear\":{\"value\":\"1996-01-01T00:00:00.000Z\"},\"citiesOfActivity\":{\"value\":[\"Paris\",\"Dakar\",\"Saint-Ouen\"]},\"placesOfFormation\":{\"value\":[\"Villa Arson Nice\"]},\"link\":{\"value\":\"https://www.instagram.com/badouce/ \"},\"biography\":{\"value\":\"Attandi Trawalley est une artiste multidisciplinaire formée à l’Université Paris VIII et à la Villa Arson à Nice. Sa pratique artistique s’articule autour de la notion de care et du soin, qu’elle explore à travers une variété de médiums, dont le textile, la teinture, le cheveu synthétique, mais aussi l’écriture et la poésie. Son travail prend la forme d’installations, de sculptures et de pièces immersives, souvent nourries par une attention au corps, aux gestes et aux formes de transmission sensibles.\\n\\nElle développe notamment, depuis plusieurs années, une pratique du crochet et du tressage à partir de cheveux synthétiques. Ce médium devient un vecteur d’exploration de sa subjectivité en tant que femme noire, en convoquant à la fois l’intime, les récits familiaux et l’imaginaire collectif qui entoure le cheveu afro. Le cheveu devient ainsi matière à réinvention, à soin, et à partage — une manière de créer de nouveaux liens, physiques et symboliques, entre corps, mémoire et communauté. Si son travail engage une réflexion sur le féminin, il n’est cependant pas exclusivement adressé aux femmes.\\n\\nAttandi Trawalley a été accueillie en résidence dans plusieurs structures artistiques en France. \\n\\nSources :\\n\\nPalais de Tokyo. « Attandi Trawalley ». Page consultée le 26 juin 2025. https://palaisdetokyo.com/en/personne/attandi-trawalley/\\n\\nVantaart. « Attandi Trawalley ». Page consultée le 26 juin 2025. https://vantaart.com/artists/168-attandi-trawalley\\n\\n« Artist interview: Attandi Trawalley - Exhibition \\\"Vertigineuses\\\" ». Selebe Yoon. 19 janvier 2024. Vidéo YouToube, 2:18. https://www.youtube.com/watch?v=V7KnW8M6JyM&ab_channel=SelebeYoon\\n\\nSelebe Yoon. « Attandi Trawalley ». Page consultée le 26 juin 2025. https://www.selebe-yoon.com/residency/attanditrawalley\\n\\nLe Consulat. « Attandi Trawalley ». Page consultée le 26 juin 2025. https://www.leconsulat.org/artistes/attandi-trawalley/\\n\\nTrawalley, Attandi. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 11 juillet 2024.\",\"translation\":{\"fr\":\"Attandi Trawalley est une artiste multidisciplinaire formée à l’Université Paris VIII et à la Villa Arson à Nice. Sa pratique artistique s’articule autour de la notion de care et du soin, qu’elle explore à travers une variété de médiums, dont le textile, la teinture, le cheveu synthétique, mais aussi l’écriture et la poésie. Son travail prend la forme d’installations, de sculptures et de pièces immersives, souvent nourries par une attention au corps, aux gestes et aux formes de transmission sensibles.\\n\\nElle développe notamment, depuis plusieurs années, une pratique du crochet et du tressage à partir de cheveux synthétiques. Ce médium devient un vecteur d’exploration de sa subjectivité en tant que femme noire, en convoquant à la fois l’intime, les récits familiaux et l’imaginaire collectif qui entoure le cheveu afro. Le cheveu devient ainsi matière à réinvention, à soin, et à partage — une manière de créer de nouveaux liens, physiques et symboliques, entre corps, mémoire et communauté. Si son travail engage une réflexion sur le féminin, il n’est cependant pas exclusivement adressé aux femmes.\\n\\nAttandi Trawalley a été accueillie en résidence dans plusieurs structures artistiques en France. \\n\\nSources :\\n\\nPalais de Tokyo. « Attandi Trawalley ». Page consultée le 26 juin 2025. https://palaisdetokyo.com/en/personne/attandi-trawalley/\\n\\nVantaart. « Attandi Trawalley ». Page consultée le 26 juin 2025. https://vantaart.com/artists/168-attandi-trawalley\\n\\n« Artist interview: Attandi Trawalley - Exhibition \\\"Vertigineuses\\\" ». Selebe Yoon. 19 janvier 2024. Vidéo YouToube, 2:18. https://www.youtube.com/watch?v=V7KnW8M6JyM&ab_channel=SelebeYoon\\n\\nSelebe Yoon. « Attandi Trawalley ». Page consultée le 26 juin 2025. https://www.selebe-yoon.com/residency/attanditrawalley\\n\\nLe Consulat. « Attandi Trawalley ». Page consultée le 26 juin 2025. https://www.leconsulat.org/artistes/attandi-trawalley/\\n\\nTrawalley, Attandi. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 11 juillet 2024.\",\"en\":\"Attandi Trawalley is a multidisciplinary artist trained at Paris VIII University and Villa Arson in Nice. Her practice centers on themes of care and nurturing, which she explores through diverse mediums such as textiles, dyeing, synthetic hair, as well as writing and poetry. Her work encompasses installations, sculptures and immersive pieces, often informed by a keen attention to the body, gestures and modes of sensory transmission.\\nFor several years, she has practiced crocheting and braiding synthetic hair, using this medium to explore her subjectivity as a Black woman. Drawing on intimacy, family stories and the collective imagination surrounding Afro hair, she transforms hair into a material for reinvention, care and connection. In this way, she creates new physical and symbolic links between the body, memory and community. While her work reflects on femininity, it is not exclusively addressed to women.\\nTrawalley has been welcomed as an artist-in-residence at several art institutions in France.\\n\\nSources consulted: \\n\\nPalais de Tokyo. ″Attandi Trawalley.″ Accessed June 26, 2025. palaisdetokyo.com/en/personne/attandi-trawalley\\n\\nVantaart. ″Attandi Trawalley.″ Accessed June 26, 2025. vantaart.com/artists/168-attandi-trawalley\\n\\n“Artist interview: Attandi Trawalley – Exhibition ‘Vertigineuses’.” Selebe Yoon. January 19, 2024. YouTube video, 2 min 18 s. youtube.com/watch?v=V7KnW8M6JyM&ab_channel=SelebeYoon\\n\\nSelebe Yoon. “Attandi Trawalley.” Accessed June 26, 2025. www.selebe-yoon.com/residency/attanditrawalley\\n\\nLe Consulat. “Attandi Trawalley.” Accessed June 26, 2025. leconsulat.org/artistes/attandi-trawalley\\n\\nTrawalley, Attandi. Interview conducted by Abigail Celis, Célia Mbas and Johanna Montlouis-Gabriel. July 11, 2024.\\n\"}},\"id\":{\"value\":\"P15\"},\"interviewEvents\":{\"value\":[\"Expo 100% La Villette 2023\",\"Expo 100% La Villette 2024\",\"Joie Collective - Apprendre à Flamboyer\",\"Vertigineuses\"]},\"interviewFavorites\":{\"value\":\"Audre Lorde, The Master's Tools Will Never Dismantle the Master's House, 1979 (livre)\\n\\nMichel Gondry, Eternal Sunshine of the Spotless mind, 2004 (film)\\n\\nSolange, Dreams, 2019 (musique)\",\"translation\":{\"fr\":\"Audre Lorde, The Master's Tools Will Never Dismantle the Master's House, 1979 (livre)\\n\\nMichel Gondry, Eternal Sunshine of the Spotless mind, 2004 (film)\\n\\nSolange, Dreams, 2019 (musique)\",\"en\":\"Audre Lorde. The Master’s Tools Will Never Dismantle the Master’s House, 1979 (book)\\nMichel Gondry. Eternal Sunshine of the Spotless Mind, 2004 (film)\\nSolange. “Dreams,” 2019 (music)\\n\"}},\"interviewQuestion\":{\"value\":\"And I ask myself who's gonna care?\",\"translation\":{\"fr\":\"And I ask myself who's gonna care?\",\"en\":\"And I ask myself who’s gonna care?\\n\\n\"}},\"credits\":{\"value\":\"Vue d’exposition Vertigineuse, 2023 - 2024, Dakar, Sénégal. Crédit photo : \",\"translation\":{\"fr\":\"Vue d’exposition Vertigineuse, 2023 - 2024, Dakar, Sénégal. Crédit photo : \",\"en\":\"View of the exhibition Vertigineuse, 2023 - 2024, Dakar, Sénégal. Photo credit:\"}}},{\"name\":{\"value\":\"Loïck \"},\"surname\":{\"value\":\"Mfoundou\"},\"roles\":{\"value\":[\"Artiste\",\"DJ\"],\"translation\":{\"fr\":[\"Artiste\",\"DJ\"],\"en\":[\"Artist\",\"DJ\"]}},\"activities\":{\"value\":[\"collage\",\"photographie\",\"écriture\",\"création sonore\"],\"translation\":{\"fr\":[\"collage\",\"photographie\",\"écriture\",\"création sonore\"],\"en\":[\"collage\",\"photography\",\"writing\",\"sound art\"]}},\"birthYear\":{\"value\":\"1998-01-01T00:00:00.000Z\"},\"citiesOfActivity\":{\"value\":[\"Paris\"]},\"placesOfFormation\":{\"value\":[\"ENSA Paris-Cergy\"]},\"link\":{\"value\":\"https://www.instagram.com/plentyglitz/ \"},\"biography\":{\"value\":\"Loïck Mfoundou développe une pratique pluridisciplinaire mêlant collage, peinture, photographie, vidéo, installation et texte. Il travaille à partir d’images de basketball américain – et plus largement de l’imagerie du rap – pour interroger la représentation des corps noirs, la mise en scène de la performance et la fabrication de figures héroïques.\\n\\nSes collages découpent et détournent des silhouettes en plein match afin de les isoler sur des fonds monochromes. Ce geste d’extraction transforme l’instant en figure, dans une recherche nourrie par la peinture classique italienne et l’iconographie catholique : frontalité, aura, attention au regard, à la posture et à la puissance symbolique de l’image. Transmise par sa famille, sa passion pour le sport devient un point d’entrée vers des questions d’histoire visuelle, de célébration et d’ambivalence.\\n\\nLe rapport au rythme et à la musique est une composante importante du travail de Loïck Mfoundou, qui, au-delà de sa pratique picturale, développe une collaboration soutenue avec des artistes de rap, en tant que hypeman sur scène, ou en tant que traducteur d’artistes rap états-uniens dans le cadre de collaborations avec des artistes francophones.\\n\\nBiographie fournie par Loïck Mfoundou.\\n\\nAjouts tirés de : \\n\\nMfoundou, Loïck. Entrevue menée par Abigail Celis, Célia Mbas et\\nJohanna Montlouis-Gabriel. 22 juillet 2024.\",\"translation\":{\"fr\":\"Loïck Mfoundou développe une pratique pluridisciplinaire mêlant collage, peinture, photographie, vidéo, installation et texte. Il travaille à partir d’images de basketball américain – et plus largement de l’imagerie du rap – pour interroger la représentation des corps noirs, la mise en scène de la performance et la fabrication de figures héroïques.\\n\\nSes collages découpent et détournent des silhouettes en plein match afin de les isoler sur des fonds monochromes. Ce geste d’extraction transforme l’instant en figure, dans une recherche nourrie par la peinture classique italienne et l’iconographie catholique : frontalité, aura, attention au regard, à la posture et à la puissance symbolique de l’image. Transmise par sa famille, sa passion pour le sport devient un point d’entrée vers des questions d’histoire visuelle, de célébration et d’ambivalence.\\n\\nLe rapport au rythme et à la musique est une composante importante du travail de Loïck Mfoundou, qui, au-delà de sa pratique picturale, développe une collaboration soutenue avec des artistes de rap, en tant que hypeman sur scène, ou en tant que traducteur d’artistes rap états-uniens dans le cadre de collaborations avec des artistes francophones.\\n\\nBiographie fournie par Loïck Mfoundou.\\n\\nAjouts tirés de : \\n\\nMfoundou, Loïck. Entrevue menée par Abigail Celis, Célia Mbas et\\nJohanna Montlouis-Gabriel. 22 juillet 2024.\",\"en\":\"Loïck Mfoundou has a multidisciplinary practice blending collage, painting, photography, video, installation and text. Using images of American basketball and, more broadly, rap imagery, he examines the representation\\nof Black bodies, the staging of performance and the construction of heroic figures.\\nFor his collages, he cuts out and reappropriates silhouettes of basketball players in motion and places them against monochromatic backgrounds. This act of extraction transforms the moment into a figure reminiscent of\\nclassical Italian painting and Catholic iconography. We find frontality, aura, attention to gaze and posture, and the symbolic power of the image. His passion for sports, passed down through his family, becomes a point of entry\\ninto questions of visual history, celebration and ambivalence.\\nAt the same time, Mfoundou’s work is heavily influenced by rhythm and music. Beyond his painting practice, he collaborates with rap artists, serving as a hype man on stage and translating for American rap artists working with French-speaking artists.\\n\\nSources consulted: \\n\\nBiography provided by Loïck Mfoundou.\\n\\nAdditions drawn from: Mfoundou, Loïck. Interview conducted by Abigail Celis, Célia Mbas and Johanna Montlouis-Gabriel. July 22, 2024.\"}},\"id\":{\"value\":\"P20\"},\"interviewEvents\":{\"value\":[\"Pour ceux qui vivent dans le pays de l'obscurité, une lumière se met à briller\",\"Trouver son monde\",\"Diaspora Renaissance\"]},\"interviewFavorites\":{\"value\":\"La Bible\\n\\nJason Hehir, The Last Dance, 2020 (série)\\n\\nKátia Lund et Fernando Meirelles, La Cité de Dieu, 2002 (film)\\n\",\"translation\":{\"fr\":\"La Bible\\n\\nJason Hehir, The Last Dance, 2020 (série)\\n\\nKátia Lund et Fernando Meirelles, La Cité de Dieu, 2002 (film)\\n\",\"en\":\"Bible\\n\\nJason Hehir, The Last Dance, 2020 (TV series)\\n\\nKátia Lund and Fernando Meirelles, La Cité de Dieu, 2002 (film)\"}},\"interviewQuestion\":{\"value\":\"Je me dois de chercher ma lumière.\",\"translation\":{\"fr\":\"Je me dois de chercher ma lumière.\",\"en\":\"I must seek my own light.\"}},\"credits\":{\"value\":\"Vue de l’exposition Trouver son monde, 2025, Paris, France. Crédit photo : 19M\",\"translation\":{\"fr\":\"Vue de l’exposition Trouver son monde, 2025, Paris, France. Crédit photo : 19M\",\"en\":\"View of the exhibition Trouver son monde, 2025, Paris, France, Photo credit: 19M\"}},\"collectives\":{\"value\":[\"Tracs\",\"Zigzag Records\"],\"mutiple\":true}},{\"name\":{\"value\":\"Dana\"},\"surname\":{\"value\":\"Cavigny\"},\"roles\":{\"value\":[\"Artiste\"],\"translation\":{\"fr\":[\"Artiste\"],\"en\":[\"Artist\"]}},\"activities\":{\"value\":[\"peinture\",\"dessin\"],\"translation\":{\"fr\":[\"peinture\",\"dessin\"],\"en\":[\"painting\",\"drawing\"]}},\"birthYear\":{\"value\":\"2001-01-01T00:00:00.000Z\"},\"citiesOfActivity\":{\"value\":[\"Paris\"]},\"placesOfFormation\":{\"value\":[\"ENSA Paris-Cergy\"]},\"link\":{\"value\":\"https://www.instagram.com/jsuis.seule/\"},\"biography\":{\"value\":\"Dana Cavigny est une artiste plasticienne, diplômée de l’Ecole Nationale Supérieure d’Art de Paris-Cergy.\\n\\nSa pratique donne une place importante au dessin et à la peinture. Elle s’intéresse à la question de l’archive, et s’appuie sur ses propres photographies personnelles et familiales. Ainsi elle représente très souvent son entourage. Cela lui permet d’entrer dans la thématique du souvenir, et dans la permanence ou l’impermanence de certains éléments de la vie: la personne qu’on a été, les personnes ou les lieux que l’on a connues, les informations manquantes voire l’oubli d'événements passés… Dans le cas de Dana, cette recherche s’articule à une histoire familiale entre la France hexagonale et la Guadeloupe.\\n\\nParmi les pièces qu’elle a réalisées, on peut compter une série de dessins toujours en cours, de grand format, mettant à l’échelle des photographies familiales. Entièrement réalisées au crayon, ces images mettent généralement en scène l’artiste, enfant, représentée en gris, au milieu d’un un environnement extrêmement coloré, utilisant toute la palette d’une boîte de crayons de couleurs. Cette stratégie picturale lui permet de différencier son corps du groupe, et d’interroger sa propre individualité. Dans d’autres pièces comme Peng Black Girls, c’est le groupe qui fait corps, représenté dans un élan de danse et de joie. La pratique de Dana passe également par l’écriture, poétique et narrative. Ses deux derniers livres, auto-édités, parlent des rapports amoureux dans l’époque contemporaine.\\n\\nSources :\\n\\nMinistère de la Culture. « Été culturel : Une galerie d’art pour valoriser la créativité des diasporas africaines. Page consultée le (mettre la date). https://www.culture.gouv.fr/regions/drac-ile-de-france/actualites/actualite-a-la-une/Ete-culturel-une-galerie-d-art-pour-valoriser-la-creativite-des-diasporas-africaines\\n\",\"translation\":{\"fr\":\"Dana Cavigny est une artiste plasticienne, diplômée de l’Ecole Nationale Supérieure d’Art de Paris-Cergy.\\n\\nSa pratique donne une place importante au dessin et à la peinture. Elle s’intéresse à la question de l’archive, et s’appuie sur ses propres photographies personnelles et familiales. Ainsi elle représente très souvent son entourage. Cela lui permet d’entrer dans la thématique du souvenir, et dans la permanence ou l’impermanence de certains éléments de la vie: la personne qu’on a été, les personnes ou les lieux que l’on a connues, les informations manquantes voire l’oubli d'événements passés… Dans le cas de Dana, cette recherche s’articule à une histoire familiale entre la France hexagonale et la Guadeloupe.\\n\\nParmi les pièces qu’elle a réalisées, on peut compter une série de dessins toujours en cours, de grand format, mettant à l’échelle des photographies familiales. Entièrement réalisées au crayon, ces images mettent généralement en scène l’artiste, enfant, représentée en gris, au milieu d’un un environnement extrêmement coloré, utilisant toute la palette d’une boîte de crayons de couleurs. Cette stratégie picturale lui permet de différencier son corps du groupe, et d’interroger sa propre individualité. Dans d’autres pièces comme Peng Black Girls, c’est le groupe qui fait corps, représenté dans un élan de danse et de joie. La pratique de Dana passe également par l’écriture, poétique et narrative. Ses deux derniers livres, auto-édités, parlent des rapports amoureux dans l’époque contemporaine.\\n\\nSources :\\n\\nMinistère de la Culture. « Été culturel : Une galerie d’art pour valoriser la créativité des diasporas africaines. Page consultée le (mettre la date). https://www.culture.gouv.fr/regions/drac-ile-de-france/actualites/actualite-a-la-une/Ete-culturel-une-galerie-d-art-pour-valoriser-la-creativite-des-diasporas-africaines\\n\",\"en\":\"Dana Cavigny, a graduate of the École nationale supérieure d’arts de Paris-Cergy, is a visual artist who describes herself as a historian and archivist of her own history. Her research and practice stand out through her exploration of photo and video archives of family, friends and loved ones, combining drawing, installation, painting, writing and performative reading.\\n \\nUsing pencil, pastel and diluted paint, Cavigny creates drawings on paper that delve into her childhood and recent memories. She places herself at the centre of an intimate narrative that examines her role as a woman and daughter across varying spatial and temporal contexts. Positioned between Guadeloupe and mainland France, her diasporic origins and birthplace inform her focus on monumentalizing pictorial details through vibrant, distinct gestures. Through her work, Cavigny gives voice to tangible memories, probing the fragile interplay between personal and structural realities.\\n \\nWriting is also integral to the artist’s practice, mainly through journaling and poetry driven by a need to archive. She writes verses and stories so as not to forget and to preserve testimonies of romance and violence that painting alone cannot fully convey. Her work resides at the intersection of territory, emotion and memory. \\n\\nSources consulted: \\n\\nMinistry of Culture. “Été culturel: une galerie d’art pour valoriser la créativité des diasporas africaines.” Accessed July 29, 2022. culture.gouv.fr/regions/drac-ile-de-france/actualites/actualite-a-la-une/Ete-culturel-une-galerie-d-art-pour-valoriser-la-creativite-des-diasporas-africaines \\n\\nCavigny, Dana. Interview conducted by Abigail Celis, Célia Mbas and Johanna Montlouis-Gabriel. July 11, 2024.\\n\"}},\"id\":{\"value\":\"P21\"},\"interviewEvents\":{\"value\":[\"Sentiments Grandissants\",\"Manifold 2022\",\"L'insulaire\"]},\"interviewFavorites\":{\"value\":\"Spike Lee, She's Gotta Have It, 1986 (film)\\n\\nMaryse Condé, Un coeur à rire et à pleurer, 1999 (livre)\\n\",\"translation\":{\"fr\":\"Spike Lee, She's Gotta Have It, 1986 (film)\\n\\nMaryse Condé, Un coeur à rire et à pleurer, 1999 (livre)\\n\",\"en\":\"Spike Lee. She’s Gotta Have It, 1986 (film)\\nMaryse Condé. Un cœur à rire et à pleurer, 1999 (book)\"}},\"interviewQuestion\":{\"value\":\"Comment maintenir les souvenirs en vie ? \",\"translation\":{\"fr\":\"Comment maintenir les souvenirs en vie ? \",\"en\":\"How can memories be kept alive? \\n\\n\"}},\"credits\":{\"value\":\"Vue des œuvres Les Mamelles (2025), et La Grimace (2021), 2025, Cergy, France. Crédit photo : Deniz\",\"translation\":{\"fr\":\"Vue des œuvres Les Mamelles (2025), et La Grimace (2021), 2025, Cergy, France. Crédit photo : Deniz\",\"en\":\"View of the works Les Mamelles (2025), et La Grimace (2021), 2025, Cergy, France. Photo credit : Deniz\"}}},{\"name\":{\"value\":\"Olivier\"},\"surname\":{\"value\":\"Marboeuf\"},\"roles\":{\"value\":[\"Commissaire d'exposition\",\"Auteur.ice\",\"Chercheur.e\",\"Artiste\",\"Editeur.ice\"],\"translation\":{\"fr\":[\"Commissaire d'exposition\",\"Auteur.ice\",\"Chercheur.e\",\"Artiste\",\"Editeur.ice\"],\"en\":[\"Curator\",\"Author\",\"Researcher\",\"Artist\",\"Publisher\"]}},\"activities\":{\"value\":[\"écriture\",\"curation\",\"recherche\",\"pratique collective\",\"bande dessinée\",\"performance\",\"dessin\",\"édition\",\"cinéma\"],\"translation\":{\"fr\":[\"écriture\",\"curation\",\"recherche\",\"pratique collective\",\"bande dessinée\",\"performance\",\"dessin\",\"édition\",\"cinéma\"],\"en\":[\"writing\",\"curation\",\"research\",\"collective practice\",\"comic book\",\"performance\",\"drawing\",\"publishing\"]}},\"birthYear\":{\"value\":\"1971-01-01T00:00:00.000Z\"},\"citiesOfActivity\":{\"value\":[\"Paris\"]},\"placesOfFormation\":{\"value\":[]},\"link\":{\"value\":\"https://olivier-marboeuf.com/\"},\"biography\":{\"value\":\"Olivier Marboeuf a commencé son parcours en co-fondant une maison d’édition de bandes dessinées, anciennement Amok, aujourd’hui dénommée Frémok. Il est dessinateur, designer graphique, commissaire d’exposition indépendant, auteur, poète et producteur de cinéma.\\n\\nL’engagement décolonial est au cœur de sa démarche. Il s’interroge et écrit sur l’histoire sociale et culturelle noire, sur les questions afro-diasporiques et sur l’idée d’une communauté transnationale noire. Il emploie, dans sa pratique de commissaire d’exposition et de travailleur de l’art, une approche relationnelle de cocréation avec d’autres participants.\\n\\nÀ travers textes, expositions, ateliers et prises de parole, Olivier Marboeuf transmet avec un rôle qui s’apparente à celui d’un témoin et d’un messager. Il s’engage pour des pratiques indépendantes et militantes. Souvent réalisés en autonomie, ses projets adoptent une forme transdisciplinaire entre production, organisation et diffusion.\\n\\nDans son processus de création, il prend ancrage dans les archives et met à l’honneur ce qui a été fait antérieurement tout en dressant un trait d’union avec l’époque actuelle avec une vision afro-futuriste.\\n\\nOlivier Marboeuf a également fondé dans les années 2000 l’espace Khiasma, centre d’art contemporain dédié aux représentations minoritaires et basé dans la ville des Lilas. Cet espace a été imaginé comme un lieu de rencontre, de travail collaboratif et d’intersection entre les différents arts et les questions postcoloniales politiques et sociales.\\n\\nSources :\\n\\nKhiasma. « Qui sommes-nous ? ». Page consultée le 15 juillet 2025. \\nhttp://www.khiasma.net/khiasma/\\n\\nOlivier Marboeuf. « À propos ». Page consultée le 15 juillet 2025. \\nhttps://olivier-marboeuf.com/a-propos/\\n\\nCKUT‑FM. 2024. Funky Revolutions : Playlist from February 10, 2024. CKUT 90.3 FM. Consulté le 10 juillet 2025. https://ckut.ca/playlists/shows/17418\\n\\nMarboeuf, Olivier. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 1er juillet 2024.\",\"translation\":{\"fr\":\"Olivier Marboeuf a commencé son parcours en co-fondant une maison d’édition de bandes dessinées, anciennement Amok, aujourd’hui dénommée Frémok. Il est dessinateur, designer graphique, commissaire d’exposition indépendant, auteur, poète et producteur de cinéma.\\n\\nL’engagement décolonial est au cœur de sa démarche. Il s’interroge et écrit sur l’histoire sociale et culturelle noire, sur les questions afro-diasporiques et sur l’idée d’une communauté transnationale noire. Il emploie, dans sa pratique de commissaire d’exposition et de travailleur de l’art, une approche relationnelle de cocréation avec d’autres participants.\\n\\nÀ travers textes, expositions, ateliers et prises de parole, Olivier Marboeuf transmet avec un rôle qui s’apparente à celui d’un témoin et d’un messager. Il s’engage pour des pratiques indépendantes et militantes. Souvent réalisés en autonomie, ses projets adoptent une forme transdisciplinaire entre production, organisation et diffusion.\\n\\nDans son processus de création, il prend ancrage dans les archives et met à l’honneur ce qui a été fait antérieurement tout en dressant un trait d’union avec l’époque actuelle avec une vision afro-futuriste.\\n\\nOlivier Marboeuf a également fondé dans les années 2000 l’espace Khiasma, centre d’art contemporain dédié aux représentations minoritaires et basé dans la ville des Lilas. Cet espace a été imaginé comme un lieu de rencontre, de travail collaboratif et d’intersection entre les différents arts et les questions postcoloniales politiques et sociales.\\n\\nSources :\\n\\nKhiasma. « Qui sommes-nous ? ». Page consultée le 15 juillet 2025. \\nhttp://www.khiasma.net/khiasma/\\n\\nOlivier Marboeuf. « À propos ». Page consultée le 15 juillet 2025. \\nhttps://olivier-marboeuf.com/a-propos/\\n\\nCKUT‑FM. 2024. Funky Revolutions : Playlist from February 10, 2024. CKUT 90.3 FM. Consulté le 10 juillet 2025. https://ckut.ca/playlists/shows/17418\\n\\nMarboeuf, Olivier. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 1er juillet 2024.\",\"en\":\"Olivier Marboeuf began his career by co-founding the comic book publishing house Amok, now called Frémok. He is an illustrator, graphic designer, independent exhibition curator, author, poet and film producer.\\nDecolonial engagement lies at the heart of his approach. He explores and writes about Black social and cultural history, Afro-diasporic issues and the concept of a transnational Black community. As an exhibition curator and cultural worker, he employs a relational approach of co-creation with other participants.\\nThrough texts, exhibitions, workshops and public speaking, Marboeuf acts as a witness and messenger. He is committed to independent and activist practices. His projects, often carried out independently, adopt a transdisciplinary approach that bridges production, organization and dissemination.\\nIn his creative process, Marboeuf draws on archives, highlighting what has been done in the past while forging a connection between the present and an Afro-futurist vision.\\nIn the 2000s, he founded Espace Khiasma, a contemporary art centre in Les Lilas dedicated to minority representations. The centre was conceived as a space for encounter and collaborative work at the intersection of diverse arts and postcolonial political and social issues.\\n\\nSources consulted: \\n\\nKhiasma. “Qui sommes-nous ?” Accessed July 15, 2025. \\nkhiasma.net/khiasma\\n\\nMarboeuf, Olivier. “À propos.” Accessed July 15, 2025. \\nolivier-marboeuf.com/a-propos\\n\\nCKUT 90.3 FM. Funky Revolutions: Playlist from February 10, 2024. Accessed July 10, 2025. \\nckut.ca/playlists/shows/17418\\n\\nMarboeuf, Olivier. Interview conducted by Abigail Celis, Célia Mbas and Johanna Montlouis-Gabriel. July 1, 2024.\\n\"}},\"id\":{\"value\":\"P31\"},\"interviewEvents\":{\"value\":[\"Outre-mer, des mémoires coloniales\",\"Rendez-vous : sortie de mon corps\",\"36e Biennale de São Paulo\"]},\"interviewFavorites\":{\"value\":\"Stuart Hall, Identités et cultures : Politiques des cultural studies, éditions Amsterdam, 2017 (livre)\\n\\nThe Black Audio Film Collective, Handsworth Songs, 1986 (film) \\n\\nCollectif Mohamed, Ils ont tué Kader, 1980 (film)\\n\",\"translation\":{\"fr\":\"Stuart Hall, Identités et cultures : Politiques des cultural studies, éditions Amsterdam, 2017 (livre)\\n\\nThe Black Audio Film Collective, Handsworth Songs, 1986 (film) \\n\\nCollectif Mohamed, Ils ont tué Kader, 1980 (film)\\n\",\"en\":\"Stuart Hall. Identités et cultures : politiques des cultural studies, Amsterdam, 2017 (book)\\nThe Black Audio Film Collective. Handsworth Songs, 1986 (film) \\nCollectif Mohamed. Ils ont tué Kader, 1980 (film)\"}},\"interviewQuestion\":{\"value\":\"Comment faire lieu ?\",\"translation\":{\"fr\":\"Comment faire lieu ?\",\"en\":\"How to create a place?\\n\\n\"}},\"credits\":{\"value\":\"Vue d'exposition Après la fin. Cartes pour un autre avenir, 2025 Centre Pompidou, Paris, France. Crédit : Olivier Marboeuf.\",\"translation\":{\"fr\":\"Vue d'exposition Après la fin. Cartes pour un autre avenir, 2025 Centre Pompidou, Paris, France. Crédit : Olivier Marboeuf.\",\"en\":\"View of the exhibition Après la fin. Cartes pour un autre avenir, 2025 Centre Pompidou, Paris, France. Credit : Olivier Marboeuf.\"}},\"collectives\":{\"value\":[\"Réseau Indépendant des Travailleur·euses et Acteur·ices des Arts Visuels en Guadeloupe (RITAA)\"],\"mutiple\":true}},{\"name\":{\"value\":\"Ladji\"},\"surname\":{\"value\":\"Diaby\"},\"roles\":{\"value\":[\"Artiste\"],\"translation\":{\"fr\":[\"Artiste\"],\"en\":[\"Artist\"]}},\"activities\":{\"value\":[\"installation\",\"vidéo\"],\"translation\":{\"fr\":[\"installation\",\"vidéo\"],\"en\":[\"installation\",\"video\"]}},\"birthYear\":{\"value\":\"2000-01-01T00:00:00.000Z\"},\"citiesOfActivity\":{\"value\":[\"Paris\",\"Ivry-sur-Seine\"]},\"placesOfFormation\":{\"value\":[\"ENSBA Paris\"]},\"link\":{\"value\":\"https://www.instagram.com/ladji777diaby/\"},\"biography\":{\"value\":\"Ladji Diaby est un artiste plasticien originaire d’Ivry-sur-Seine. \\nLe travail de Ladji prend la forme d’une mise en espace d’objets, de sculptures et d’images qui renvoient à l’idée d’un espace domestique inspiré directement de son contexte familial. Par ces objets et volumes, conçus pour certains comme des ready-made assemblant des éléments hétéroclites et de récupération, il met en place un univers décalé, parfois presque absurde, mais qui n’en demeure pas moins familier, car nourri de références digérées par l’artiste: memes, images extraites de clips musicaux, jeux vidéos, émissions télé…\\n\\nDans cet univers, image et objet se confondent: certaines photographies personnelles ou images sourcées sur internet par Ladji sont transférées sur des objets comme une feuille à carreaux, ou des assemblages de contreplaqué. En parallèle, certains éléments en volume, une fois regroupés et accrochés ensemble, forment de nouvelles images.\\nCette forme de réappropriation intègre parfois des éléments propres au contexte dans lequel a grandi Ladji et aux différentes pièces d’un appartement: meubles du salon, éléments ramenant à la chambre des parents, formes rappelant des jouets d’enfants…\\n\\nLes éléments et images prélevés renvoient à des espaces géographiques et générationnels différents: clips de rap américain du début des années 2000, personnages de mangas japonais, éléments de décoration que l’on retrouve chez les familles ouest-africaines immigrées en France… toutes ces références et signes renvoient à la façon qu’a Ladji Diaby d’éprouver et de faire l’expérience du monde, dans une forme d’interculturalité subjective.\\n\\nSources :\\n\\nKunstverein Nürnberg. « No one has ever called their child hunger ». Page consultée le 27 juillet 2025.  https://kunstvereinnuernberg.de/en/exhibitions/no-one-has-ever-called-their-child-hunger\\n\\nSilveria, Paige. « Just thinking : An interview of Paris-based artist Ladji Diaby ». Page consultée le 27 juillet 2025. https://autre.love/interviewsmain/2024/4/16/just-thinking-interview-of-paris-based-artist-ladji-diaby\\n\\nDiaby, Ladji. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 1er juillet 2024.\",\"translation\":{\"fr\":\"Ladji Diaby est un artiste plasticien originaire d’Ivry-sur-Seine. \\nLe travail de Ladji prend la forme d’une mise en espace d’objets, de sculptures et d’images qui renvoient à l’idée d’un espace domestique inspiré directement de son contexte familial. Par ces objets et volumes, conçus pour certains comme des ready-made assemblant des éléments hétéroclites et de récupération, il met en place un univers décalé, parfois presque absurde, mais qui n’en demeure pas moins familier, car nourri de références digérées par l’artiste: memes, images extraites de clips musicaux, jeux vidéos, émissions télé…\\n\\nDans cet univers, image et objet se confondent: certaines photographies personnelles ou images sourcées sur internet par Ladji sont transférées sur des objets comme une feuille à carreaux, ou des assemblages de contreplaqué. En parallèle, certains éléments en volume, une fois regroupés et accrochés ensemble, forment de nouvelles images.\\nCette forme de réappropriation intègre parfois des éléments propres au contexte dans lequel a grandi Ladji et aux différentes pièces d’un appartement: meubles du salon, éléments ramenant à la chambre des parents, formes rappelant des jouets d’enfants…\\n\\nLes éléments et images prélevés renvoient à des espaces géographiques et générationnels différents: clips de rap américain du début des années 2000, personnages de mangas japonais, éléments de décoration que l’on retrouve chez les familles ouest-africaines immigrées en France… toutes ces références et signes renvoient à la façon qu’a Ladji Diaby d’éprouver et de faire l’expérience du monde, dans une forme d’interculturalité subjective.\\n\\nSources :\\n\\nKunstverein Nürnberg. « No one has ever called their child hunger ». Page consultée le 27 juillet 2025.  https://kunstvereinnuernberg.de/en/exhibitions/no-one-has-ever-called-their-child-hunger\\n\\nSilveria, Paige. « Just thinking : An interview of Paris-based artist Ladji Diaby ». Page consultée le 27 juillet 2025. https://autre.love/interviewsmain/2024/4/16/just-thinking-interview-of-paris-based-artist-ladji-diaby\\n\\nDiaby, Ladji. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 1er juillet 2024.\",\"en\":\"Ladji Diaby is a visual artist from Ivry-sur-Seine. His work comprises spatial arrangements of objects, sculptures and images that evoke a domestic space inspired by his own family context. Through these objects, some of which are ready-mades that assemble disparate, recycled elements, Diaby creates a quirky, borderline-absurd yet familiar universe. This world is enriched by references drawn from his private life, drawing on memes, images extracted from music videos, video games and TV shows.\\n\\nIn this universe, images and objects converge. Ladji transfers personal photographs and internet images onto surfaces such as sheets of graph paper or plywood assemblages. At the same time, he gathers three-dimensional elements and rearranges them into new compositions. This form of reappropriation often incorporates elements specific to the context in which Ladji grew up or to the different rooms of an apartment, including living room furniture and objects reminiscent of his parents’ bedroom or children’s toys.\\n\\nThese images and objects refer to various geographical and generational spaces, ranging from American rap videos of the early 2000s to Japanese manga characters and decorative motifs typically found in the homes of West African immigrants in France. Together, these references embody Ladji Diaby’s subjective, intercultural sensitivity and lived experience.\\n\\nSources consulted: \\n\\nKunstverein Nürnberg. “No one has ever called their child hunger.” Accessed July 27, 2025. \\nkunstvereinnuernberg.de/en/exhibitions/no-one-has-ever-called-their-child-hunger \\n\\nSilveria, Paige. “Just thinking: An interview with Paris-based artist Ladji Diaby.” Accessed July 27, 2025. \\nautre.love/interviewsmain/2024/4/16/just-thinking-interview-of-paris-based-artist-ladji-diaby \\n\\nDiaby, Ladji. Interview conducted by Abigail Celis, Célia Mbas and Johanna Montlouis-Gabriel. July 1, 2024.\\n\\n\\n\"}},\"id\":{\"value\":\"P49\"},\"interviewEvents\":{\"value\":[\"No One Has Ever Called Their Child Hunger\",\"Is something missing?\",\"Wind of Fortune\"]},\"interviewFavorites\":{\"value\":\"Cheikh Hamidou Kane, L'aventure ambiguë, 1961 (film)\\n\\nTakeshi Kitano, Hana-bi, 1997 (film)\\n\\nNaoki Urasawa, Billy Bat, 2008 (livre)\",\"translation\":{\"fr\":\"Cheikh Hamidou Kane, L'aventure ambiguë, 1961 (film)\\n\\nTakeshi Kitano, Hana-bi, 1997 (film)\\n\\nNaoki Urasawa, Billy Bat, 2008 (livre)\",\"en\":\"Cheikh Hamidou Kane. L’aventure ambiguë, 1961 (film)\\nTakeshi Kitano. Hana-bi, 1997 (film)\\nNaoki Urasawa. Billy Bat, 2008 (book)\"}},\"interviewQuestion\":{\"value\":\"Peut-on créer un monde nouveau en l'écrivant ?\",\"translation\":{\"fr\":\"Peut-on créer un monde nouveau en l'écrivant ?\",\"en\":\"Can we create a new world by writing it?\"}},\"credits\":{\"value\":\"Vue de l'exposition WIND OF FORTUNE, 2025, Beaux-Arts de Paris, Paris, France. Crédit photo: William Basseux\",\"translation\":{\"fr\":\"Vue de l'exposition WIND OF FORTUNE, 2025, Beaux-Arts de Paris, Paris, France. Crédit photo: William Basseux\",\"en\":\"View of the exhibition WIND OF FORTUNE, 2025, Beaux-Arts de Paris, Paris, France. Photo credit: William Basseux\"}}},{\"name\":{\"value\":\"Marie-Julie\"},\"surname\":{\"value\":\"Chalu\"},\"roles\":{\"value\":[\"Artiste\",\"Auteur.ice\"],\"translation\":{\"fr\":[\"Artiste\",\"Auteur.ice\"],\"en\":[\"Artist\",\"Author\",\"Art historian\"]}},\"activities\":{\"value\":[\"art de la scène\",\"cinéma\"],\"translation\":{\"fr\":[\"art de la scène\",\"cinéma\"],\"en\":[\"living arts\",\"filmmaking\"]}},\"birthYear\":{\"value\":\"1987-01-01T00:00:00.000Z\"},\"citiesOfActivity\":{\"value\":[\"Paris\"]},\"placesOfFormation\":{\"value\":[]},\"link\":{\"value\":\"https://www.instagram.com/c_mariejulie/\"},\"biography\":{\"value\":\"Marie-Julie Chalu est une ​artiste et créatrice de projets culturels qui évolue principalement dans le domaine du théâtre. Elle s’engage pour une pensée afroféministe, son travail est dirigé par le besoin de « se raconter » et de partager les histoires, les corps et les regards de femmes noires. Elle a notamment participé au documentaire d’Amandine Gay Ouvrir la voix (2016), sur les femmes noires issues de l’histoire coloniale européenne en Afrique et aux Antilles. Elle répond à travers ses projets à un besoin de se réapproprier et d’affirmer la multiplicité des identités noires. Ses recherches portent aussi sur des arts tels que la musique et le cinéma.\\n\\nMarie-Julie Chalu a fondé en 2014 la plateforme ico•no•cl•a•ste. Cette plateforme de création culturelle rassemble plusieurs de ses projets et développe des questionnements sur « les imaginaires et les utopies marginales, les cultures diasporiques et l'archive (1)». Afropea, un des projets de cette plateforme, a pour but de rassembler et de partager des recherches, des archives et des œuvres sur les identités noires européennes. Entre 2021 et 2022, elle conçoit et anime également le podcast Zouk Vintage, dédié au zouk. En créant ces espaces de partage et de réflexion, et en s’engageant pour une poésie et un théâtre afroféministe, Marie-Julie Chalu transmet des expériences et des imaginaires dits « minoritaires » et fait naître des moments de soin communautaire.\\n\\nAu-delà des compagnies de théâtre dans lesquelles elle s’implique, Marie-Julie Chalu poursuit sa démarche collaborative en militant avec le collectif​ afroféministe Mwasi.\\n\\n\\n(1) : Helloasso. « Iconoclaste plateforme créative ». Page consultée le 16 juillet 2025. \\nhttps://www.helloasso.com/associations/iconoclaste-plateforme-creative?fbclid=PAZXh0bgNhZW0CMTEAAaetJy1fqPyijFDgHxreHR_yahkrAf8Lg30qU3_Y--nh-Io9_7e-4PnP2Gdx_Q_aem_MCnTkaoNXMu7ZFftWD3rIQ\\n\\nSources :\\n\\nAfropea, « A propos ». Page consultée le 16 juillet 2025. \\nhttps://afropea.net/about-us/\\n\\nLa Collective Ces filles-là. « Marie-Julie Chalu ». Page consultée le 16 juillet 2025.\\nhttps://www.lacollectivecesfillesla.com/mj\\n\\nLafayette Anticipations. « Marie-Julie Chalu ». Page consultée le 16 juillet 2025.\\nhttps://www.lafayetteanticipations.com/fr/artiste/marie-julie-chalu\\n\\nHelloasso. « Iconoclaste plateforme créative ». Page consultée le 16 juillet 2025.\\nhttps://www.helloasso.com/associations/iconoclaste-plateforme-creative?fbclid=PAZXh0bgNhZW0CMTEAAaetJy1fqPyijFDgHxreHR_yahkrAf8Lg30qU3_Y--nh-Io9_7e-4PnP2Gdx_Q_aem_MCnTkaoNXMu7ZFftWD3rIQ\\n\\nMWASI. « Qui nous sommes ». Page consultée le 16 juillet 2025.\\nhttps://www.mwasicollectif.org/\\n\\nChalu, Marie-Julie. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 1er juillet 2024.\\n\",\"translation\":{\"fr\":\"Marie-Julie Chalu est une ​artiste et créatrice de projets culturels qui évolue principalement dans le domaine du théâtre. Elle s’engage pour une pensée afroféministe, son travail est dirigé par le besoin de « se raconter » et de partager les histoires, les corps et les regards de femmes noires. Elle a notamment participé au documentaire d’Amandine Gay Ouvrir la voix (2016), sur les femmes noires issues de l’histoire coloniale européenne en Afrique et aux Antilles. Elle répond à travers ses projets à un besoin de se réapproprier et d’affirmer la multiplicité des identités noires. Ses recherches portent aussi sur des arts tels que la musique et le cinéma.\\n\\nMarie-Julie Chalu a fondé en 2014 la plateforme ico•no•cl•a•ste. Cette plateforme de création culturelle rassemble plusieurs de ses projets et développe des questionnements sur « les imaginaires et les utopies marginales, les cultures diasporiques et l'archive (1)». Afropea, un des projets de cette plateforme, a pour but de rassembler et de partager des recherches, des archives et des œuvres sur les identités noires européennes. Entre 2021 et 2022, elle conçoit et anime également le podcast Zouk Vintage, dédié au zouk. En créant ces espaces de partage et de réflexion, et en s’engageant pour une poésie et un théâtre afroféministe, Marie-Julie Chalu transmet des expériences et des imaginaires dits « minoritaires » et fait naître des moments de soin communautaire.\\n\\nAu-delà des compagnies de théâtre dans lesquelles elle s’implique, Marie-Julie Chalu poursuit sa démarche collaborative en militant avec le collectif​ afroféministe Mwasi.\\n\\n\\n(1) : Helloasso. « Iconoclaste plateforme créative ». Page consultée le 16 juillet 2025. \\nhttps://www.helloasso.com/associations/iconoclaste-plateforme-creative?fbclid=PAZXh0bgNhZW0CMTEAAaetJy1fqPyijFDgHxreHR_yahkrAf8Lg30qU3_Y--nh-Io9_7e-4PnP2Gdx_Q_aem_MCnTkaoNXMu7ZFftWD3rIQ\\n\\nSources :\\n\\nAfropea, « A propos ». Page consultée le 16 juillet 2025. \\nhttps://afropea.net/about-us/\\n\\nLa Collective Ces filles-là. « Marie-Julie Chalu ». Page consultée le 16 juillet 2025.\\nhttps://www.lacollectivecesfillesla.com/mj\\n\\nLafayette Anticipations. « Marie-Julie Chalu ». Page consultée le 16 juillet 2025.\\nhttps://www.lafayetteanticipations.com/fr/artiste/marie-julie-chalu\\n\\nHelloasso. « Iconoclaste plateforme créative ». Page consultée le 16 juillet 2025.\\nhttps://www.helloasso.com/associations/iconoclaste-plateforme-creative?fbclid=PAZXh0bgNhZW0CMTEAAaetJy1fqPyijFDgHxreHR_yahkrAf8Lg30qU3_Y--nh-Io9_7e-4PnP2Gdx_Q_aem_MCnTkaoNXMu7ZFftWD3rIQ\\n\\nMWASI. « Qui nous sommes ». Page consultée le 16 juillet 2025.\\nhttps://www.mwasicollectif.org/\\n\\nChalu, Marie-Julie. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 1er juillet 2024.\\n\",\"en\":\"Marie-Julie Chalu is an artist and creator of cultural projects who works primarily in theatre. Committed to Afro-feminist thinking, she is driven by the need to “tell her story” and share the stories, bodies and perspectives of Black women. She contributed to Amandine Gay’s documentary Ouvrir la voix (2016), which explores the experiences of Black women from the European colonial history in Africa and the Caribbean. Through her work, Chalu affirms and reclaims the multiplicity of Black identities. Her research also focuses on art forms such as music and cinema.\\nIn 2014, Chalu founded the ico•no•cl•a•ste platform, which brings together several of her projects around themes of marginalized thoughts and voices, diasporic cultural knowledge, and the concept of archives.\\nOne of the platform’s projects, Afropea, collects and disseminates research, archives and works on Black European identities. From 2021 to 2022, she also designed and hosted the Zouk Vintage podcast, which is dedicated to zouk music. By creating spaces for sharing and reflection, and through her engagement with Afro-feminist poetry and theatre, Chalu highlights “minority” experiences and imaginations, fostering moments of community care.\\nBeyond her theatre work, she continues a collaborative approach through activism with the Afro-feminist collective Mwasi.\\n\\nSources consulted: \\n\\nAfropea. “À propos.” Accessed July 16, 2025. \\nafropea.net/about-us\\nLa Collective Ces filles-là. “Marie-Julie Chalu.” Accessed July 16, 2025. \\nlacollectivecesfillesla.com/mj\\n\\nLafayette Anticipations. “Marie-Julie Chalu.” Accessed July 16, 2025. \\nlafayetteanticipations.com/fr/artiste/marie-julie-chalu\\n\\nHelloasso. “Iconoclaste plateforme créative.” Accessed July 16, 2025. \\nhelloasso.com/associations/iconoclaste-plateforme-creative?fbclid=PAZXh0bgNhZW0CMTEAAaetJy1fqPyijFDgHxreHR_yahkrAf8Lg30qU3_Y—nh-Io9_7e-4PnP2Gdx_Q_aem_MCnTkaoNXMu7ZFftWD3rIQ\\n\\nMWASI. “Qui nous sommes.” Accessed July 16, 2025.\\nmwasicollectif.org\\n\\nChalu, Marie-Julie. Interview conducted by Abigail Celis, Célia Mbas and Johanna Montlouis-Gabriel. July 1, 2024\\n\\n\\n\"}},\"id\":{\"value\":\"P53\"},\"interviewEvents\":{\"value\":[\"Kréyol Factory\",\"Nyansapo Fest’ 2017\",\"Carte noire nommée Désir\"]},\"interviewFavorites\":{\"value\":\"bell hooks, Regards oppositionnels: Se défaire des représentations dominantes (1992), éditions Payot, 2025 (livre)\\n\\nAlexis Pauline Gumbs, Non-noyées: Leçons féministes Noires apprises auprès des mammifères marines, 2024 (livre)\\n\\nThe Funambulist (magazine)\",\"translation\":{\"fr\":\"bell hooks, Regards oppositionnels: Se défaire des représentations dominantes (1992), éditions Payot, 2025 (livre)\\n\\nAlexis Pauline Gumbs, Non-noyées: Leçons féministes Noires apprises auprès des mammifères marines, 2024 (livre)\\n\\nThe Funambulist (magazine)\",\"en\":\"bell hooks. Regards oppositionnels : se défaire des représentations dominantes (1992), Payot Publishing, 2025 (book)\\nAlexis Pauline Gumbs, Non-noyées : leçons féministes Noires apprises auprès des mammifères marines, 2024 (book)\\nThe Funambulist (magazine)\"}},\"interviewQuestion\":{\"value\":\"Comment se réparer ?\",\"translation\":{\"fr\":\"Comment se réparer ?\",\"en\":\"How can we heal?\\n\\n\"}},\"credits\":{\"value\":\"Vue d’exposition Le Centre d'archives afroféministes, 2025, Laboratoires d'Aubervilliers, France. Crédit photo: Élodie Martial\",\"translation\":{\"fr\":\"Vue d’exposition Le Centre d'archives afroféministes, 2025, Laboratoires d'Aubervilliers, France. Crédit photo: Élodie Martial\",\"en\":\"View of the exhibition Le Centre d'archives afroféministes, 2025, Laboratoires d'Aubervilliers, France. Photo credit: Élodie Martial\"}},\"collectives\":{\"value\":[\"Mwasi\"],\"mutiple\":true}},{\"name\":{\"value\":\"Aby\"},\"surname\":{\"value\":\"Gaye-Duparc\"},\"roles\":{\"value\":[\"Commissaire d'exposition\"],\"translation\":{\"fr\":[\"Commissaire d'exposition\"],\"en\":[\"Curator\"]}},\"activities\":{\"value\":[\"curation\"],\"translation\":{\"fr\":[\"curation\"],\"en\":[\"curation\"]}},\"birthYear\":{\"value\":\"1996-01-01T00:00:00.000Z\"},\"citiesOfActivity\":{\"value\":[\"Paris\"]},\"placesOfFormation\":{\"value\":[\"École des Hautes Etudes en Sciences Sociales\",\"Université Sorbonne Nouvelle\",\"Université Paris 1 Panthéon - Sorbonne\"]},\"link\":{\"value\":\"https://www.instagram.com/abygaye_/\"},\"biography\":{\"value\":\"Aby Gaye-Duparc est curatrice à la Fondation Cartier pour l’art contemporain et candidate au doctorat en histoire de l’art à l’École des hautes études en sciences sociales. Sa recherche doctorale porte sur les artistes femmes au Sénégal entre les années 1960 et 1990, à l’aune des mouvements féministes, panafricains et de l’établissement d’un art national après l’indépendance du pays (sous la direction d'Anne Lafont).\\n\\nAu sein de la Fondation Cartier, elle développe des projets artistiques qui introduisent la question noire dans l'institution, notamment à travers une attention particulière portée aux artistes basé·e·s en Afrique de l’Ouest. Elle a précédemment travaillé comme chargée de développement aux Amis du Centre Pompidou (2019–2021), où elle a contribué activement au groupe d’acquisition Afrique.\\n\\nEn 2021, elle cofonde à Dakar la bibliothèque féministe AWU, un espace dédié aux pensées et écritures de femmes africaines et afro-descendantes issues de tous les continents. Bien qu’elle n’en assure plus la gestion quotidienne, elle reste engagée dans le projet à travers des dons d’ouvrages et un travail de transmission. C’est dans cette continuité qu’elle participe à la réédition de l’ouvrage La parole aux Négresses d’Awa Thiam, aux côtés de Mame-Fatou Niang et des éditions Divergences.\\n\\nAby Gaye-Duparc s'engage également activement dans la recherche en rédigeant des articles sur des thématiques telles que le \\\"Blackness\\\" et l'expérience noire, et elle participe également à des études portant sur les pratiques. En 2025, elle a présenté une partie de sa recherche sur l’artiste Younousse Sèye lors de la journée d’étude Revisiter Paris Noir, organisée par l’EHESS au Centre Pompidou.\\n\\n\\nSources :\\n\\nThe Art Momentum. « Aby Gaye ». Page consultée le 26 juin 2025. https://theartmomentum.com/contributors/\\n\\nGaye-Duparc, Aby. 2025. Profil LinkedIn. Consulté le 26 juin 2025. https://www.linkedin.com/in/abygayeduparc/?originalSubdomain=fr\\n\\nBarontini, Raphaël, Coline Desportes, Farah Clémentine Dramani‑Issifou, Kenny Dunkan, Aby Gaye-Duparc, Vanina Géré, Alexandre Girard‑Muscagorry, et al. « Blackness: ici et maintenant ». Perspective 1 (2023) : 73–103. https://doi.org/10.4000/perspective.29130\\n\\nGaye‑Duparc, Aby. « Le Gee’s Bend Quilt Collective, une histoire du Sud des États‑Unis ». Archives of Women Artists, Research and Exhibitions Magazine ( 2023).\\nhttps://awarewomenartists.com/magazine/le-gees-bend-quilt-collective-une-histoire-du-sud-des-etats-unis/\\n\\nGaye-Duparc, Aby. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 8 juillet 2024.\",\"translation\":{\"fr\":\"Aby Gaye-Duparc est curatrice à la Fondation Cartier pour l’art contemporain et candidate au doctorat en histoire de l’art à l’École des hautes études en sciences sociales. Sa recherche doctorale porte sur les artistes femmes au Sénégal entre les années 1960 et 1990, à l’aune des mouvements féministes, panafricains et de l’établissement d’un art national après l’indépendance du pays (sous la direction d'Anne Lafont).\\n\\nAu sein de la Fondation Cartier, elle développe des projets artistiques qui introduisent la question noire dans l'institution, notamment à travers une attention particulière portée aux artistes basé·e·s en Afrique de l’Ouest. Elle a précédemment travaillé comme chargée de développement aux Amis du Centre Pompidou (2019–2021), où elle a contribué activement au groupe d’acquisition Afrique.\\n\\nEn 2021, elle cofonde à Dakar la bibliothèque féministe AWU, un espace dédié aux pensées et écritures de femmes africaines et afro-descendantes issues de tous les continents. Bien qu’elle n’en assure plus la gestion quotidienne, elle reste engagée dans le projet à travers des dons d’ouvrages et un travail de transmission. C’est dans cette continuité qu’elle participe à la réédition de l’ouvrage La parole aux Négresses d’Awa Thiam, aux côtés de Mame-Fatou Niang et des éditions Divergences.\\n\\nAby Gaye-Duparc s'engage également activement dans la recherche en rédigeant des articles sur des thématiques telles que le \\\"Blackness\\\" et l'expérience noire, et elle participe également à des études portant sur les pratiques. En 2025, elle a présenté une partie de sa recherche sur l’artiste Younousse Sèye lors de la journée d’étude Revisiter Paris Noir, organisée par l’EHESS au Centre Pompidou.\\n\\n\\nSources :\\n\\nThe Art Momentum. « Aby Gaye ». Page consultée le 26 juin 2025. https://theartmomentum.com/contributors/\\n\\nGaye-Duparc, Aby. 2025. Profil LinkedIn. Consulté le 26 juin 2025. https://www.linkedin.com/in/abygayeduparc/?originalSubdomain=fr\\n\\nBarontini, Raphaël, Coline Desportes, Farah Clémentine Dramani‑Issifou, Kenny Dunkan, Aby Gaye-Duparc, Vanina Géré, Alexandre Girard‑Muscagorry, et al. « Blackness: ici et maintenant ». Perspective 1 (2023) : 73–103. https://doi.org/10.4000/perspective.29130\\n\\nGaye‑Duparc, Aby. « Le Gee’s Bend Quilt Collective, une histoire du Sud des États‑Unis ». Archives of Women Artists, Research and Exhibitions Magazine ( 2023).\\nhttps://awarewomenartists.com/magazine/le-gees-bend-quilt-collective-une-histoire-du-sud-des-etats-unis/\\n\\nGaye-Duparc, Aby. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 8 juillet 2024.\",\"en\":\"Aby Gaye-Duparc is a curator at the Fondation Cartier pour l’art contemporain and a doctoral candidate in art history at the École des hautes études en sciences sociales. Her doctoral research (under the supervision of Anne Lafont) focuses on women artists in Senegal from the 1960s to the 1990s, examining them in the context of feminist and Pan-African movements as well as the development of a national art form following the country’s independence.\\nAt the Fondation Cartier, she curates artistic projects that bring Black issues into the institution, with a particular focus on artists from West Africa. She previously worked as a development officer at Les Amis du Centre Pompidou (2019–2021), where she played an active role in the Africa acquisition group.\\nIn 2021, she co-founded the AWU feminist library in Dakar, a space dedicated to the thoughts and writings of African women and afrodescendant women from all over the world. Although no longer involved in its daily management, she continues to support the project through book donations and outreach work. Aligned with this commitment, she is participating in the republication of Awa Thiam’s La parole aux Négresses, alongside Mame-Fatou Niang and the Divergences publishing house.\\nAby Gaye-Duparc is also actively engaged in research, writing on topics such as “Blackness” and the Black experience, and contributing to studies on related artistic practices. In 2025, she presented some of her research on the artist Younousse Sèye at the Revisiter Paris Noir symposium organized by EHESS at the Centre Pompidou.\\n\\nSources consulted: \\n\\nThe Art Momentum. “Aby Gaye.” Accessed June 26, 2025. theartmomentum.com/contributors\\n\\nGaye, Aby. 2025. LinkedIn profile. Accessed June 26, 2025. linkedin.com/in/abygayeduparc/?originalSubdomain=fr\\n\\nBarontini, Raphaël, Coline Desportes, Farah Clémentine Dramani-Issifou, Kenny Dunkan, Aby Gaye, Vanina Géré, Alexandre Girard-Muscagorry, et al. “Blackness: ici et maintenant.” Perspective 1(2023): 73–103. \\ndoi.org/10.4000/perspective.29130 \\n\\nGaye-Duparc, Aby. ″Le Gee’s Bend Quilt Collective, une histoire du Sud des États-Unis.″ Archives of Women Artists, Research and Exhibitions Magazine (2023). awarewomenartists.com/magazine/le-gees-bend-quilt-collective-une- histoire-du-sud-des-etats-unis\\n\\nGaye, Aby. Interview conducted by Abigail Celis, Célia Mbas and Johanna Montlouis-Gabriel. July 8, 2024.\\n\\n\"}},\"id\":{\"value\":\"P54\"},\"interviewEvents\":{\"value\":[\"Seydou Keïta\",\"Collection permanente, Studio Museum in Harlem\",\"Ubuntu, un rêve lucide\",\"Biennale de Dak'art 2024\"]},\"interviewFavorites\":{\"value\":\"Chimamanda Ngozi Adichie, Half of a Yellow Sun, 2006 (livre)\\n\\nLa musique d'Alice Coltrane et de Don Cherry (musiques)\\n\\nDjibril Diop Mambéty, La petite vendeuse de soleil, 1999 (film)\",\"translation\":{\"fr\":\"Chimamanda Ngozi Adichie, Half of a Yellow Sun, 2006 (livre)\\n\\nLa musique d'Alice Coltrane et de Don Cherry (musiques)\\n\\nDjibril Diop Mambéty, La petite vendeuse de soleil, 1999 (film)\",\"en\":\"Chimamanda Ngozi Adichie. Half of a Yellow Sun, 2006 (book)\\nThe music of Alice Coltrane and Don Cherry (music)\\nDjibril Diop Mambéty. La petite vendeuse de soleil, 1999 (film)\\n\\n\"}},\"interviewQuestion\":{\"value\":\"Comment déconstruire et re-narrativiser les récits de l’histoire de l’art, du XIXᵉ siècle à l’époque contemporaine, en prenant en considération les perspectives minoritaires et en mobilisant des formes narratives issues de la fiction, de la littérature, du cinéma et de la musique ?\",\"translation\":{\"fr\":\"Comment déconstruire et re-narrativiser les récits de l’histoire de l’art, du XIXᵉ siècle à l’époque contemporaine, en prenant en considération les perspectives minoritaires et en mobilisant des formes narratives issues de la fiction, de la littérature, du cinéma et de la musique ?\",\"en\":\"How can we deconstruct and renarrate the narratives of art history, from the 19th century to the present day, taking into account minority perspectives and drawing on narrative forms from fiction, literature, cinema and music?\\n\\n\"}},\"credits\":{\"value\":\"Vue de l'exposition James Barnor: On the Road, 2024 – 2025, Savannah Centre for Contemporary Art, Tamale, Ghana. Co-commissaire: Margaux Lavernhe, Aby Gaye-Duparc.\",\"translation\":{\"fr\":\"Vue de l'exposition James Barnor: On the Road, 2024 – 2025, Savannah Centre for Contemporary Art, Tamale, Ghana. Co-commissaire: Margaux Lavernhe, Aby Gaye-Duparc.\",\"en\":\"View of the exhibition James Barnor: On the Roa, 2024 – 2025, Savannah Centre for Contemporary Art, Tamale, Ghana, Co-curator: Margaux Lavernhe, Aby Gaye-Duparc\"}}},{\"name\":{\"value\":\"Pascale\"},\"surname\":{\"value\":\"Obolo\"},\"roles\":{\"value\":[\"Commissaire d'exposition\",\"Chercheur.e\",\"Auteur.ice\",\"Artiste\",\"Editeur.ice\",\"Réalisateur.ice\"],\"translation\":{\"fr\":[\"Commissaire d'exposition\",\"Chercheur.e\",\"Auteur.ice\",\"Artiste\",\"Editeur.ice\",\"Réalisateur.ice\"],\"en\":[\"Curator\",\"Researcher\",\"Author\",\"Artist\",\"Publisher\",\"Film director\"]}},\"activities\":{\"value\":[\"curation\",\"recherche\",\"pratique collective\",\"cinéma\",\"danse\",\"édition\",\"écriture\",\"foire d'édition en art\"],\"translation\":{\"fr\":[\"curation\",\"recherche\",\"pratique collective\",\"cinéma\",\"danse\",\"édition\",\"écriture\",\"foire d'édition en art\"],\"en\":[\"curation\",\"research\",\"collective practice\",\"filmmaking\",\"dance\",\"publishing\",\"writing\"]}},\"birthYear\":{\"value\":\"1967-01-01T00:00:00.000Z\"},\"citiesOfActivity\":{\"value\":[\"Paris\",\"Berlin\"]},\"placesOfFormation\":{\"value\":[\"Université Paris 8 Vincennes - Saint-Denis\",\"CLCF École de cinéma\"]},\"link\":{\"value\":\"https://www.instagram.com/obolopascale/?hl=fr\"},\"biography\":{\"value\":\"Pascale Obolo est une cinéaste-chercheuse et commissaire d’exposition indépendante, elle est aussi fondatrice et rédactrice en chef de la revue d’art contemporain Afrikadaa.\\n\\nElle explore dans son travail les pratiques de transmission des savoirs au sein de différentes formes d’art telles que la danse ou la musique, toujours en adoptant une démarche afro-féministe. À travers les films qu’elle conçoit, Pascale Obolo traite des sujets de la mémoire, de l’identité et de l’effacement des récits des minorités. Dans sa pratique de commissaire d’exposition, elle porte son regard sur les écosystèmes de soins collectifs et elle étudie les stratégies de résistances développées à travers la création artistique.\\n\\nElle a notamment documenté des pratiques collectives au sein des scènes artistiques du Hip Hop, du double dutch et du graffiti en France et aux Etats-Unis. En produisant et en rassemblant des archives sur ces différentes scènes, Pascale Obolo participe à conserver et à transmettre la mémoire de groupes et d’histoires invisibilisées.\\n\\nAu-delà des films et des expositions, elle est également à l’origine de pratiques indépendantes et militantes avec Afrikadaa, à la fois revue, association et laboratoire intellectuel et artistique. Afrikadaa « a pour but de promouvoir et de développer l’art et les artistes issus ou en lien avec le continent africain et ses diasporas (1)» et de faciliter l’accès à l’art notamment à travers une programmation d’ateliers collectifs. Elle est aussi directrice de l’African Art Book Fair, foire d’édition indépendante « dédiée à la création contemporaine du continent africain et des diasporas (2)».\\n\\n(1) : Afrikadaa. « Qui sommes-nous ? ». Page consultée le 7 juillet 2025. \\nhttp://www.afrikadaa.com/p/qui-sommes-us.htmlno\\n\\n(2) : African art book fair. « About AABF ». Page consultée le 7 juillet 2025. \\nhttps://africanartbookfair.com/about/\\n\\nSources :\\n\\nAfrican art book fair. « About AABF ». Page consultée le 7 juillet 2025. \\nhttps://africanartbookfair.com/about/\\n\\nAfrikadaa. « Qui sommes-nous ? ». Page consultée le 7 juillet 2025. \\nhttp://www.afrikadaa.com/p/qui-sommes-us.htmlno\\n\\nVilla Albertine. « Pascale Obolo ». Page consultée le 7 juillet 2025. \\nhttps://villa-albertine.org/va/fr/residents/pascale-obolo/\\n\\nThéâtre de l’usine. « Pascale Obolo ». Page consultée le 7 juillet 2025. \\nhttps://www.theatredelusine.ch/artiste/pascale-obolo/\\n\",\"translation\":{\"fr\":\"Pascale Obolo est une cinéaste-chercheuse et commissaire d’exposition indépendante, elle est aussi fondatrice et rédactrice en chef de la revue d’art contemporain Afrikadaa.\\n\\nElle explore dans son travail les pratiques de transmission des savoirs au sein de différentes formes d’art telles que la danse ou la musique, toujours en adoptant une démarche afro-féministe. À travers les films qu’elle conçoit, Pascale Obolo traite des sujets de la mémoire, de l’identité et de l’effacement des récits des minorités. Dans sa pratique de commissaire d’exposition, elle porte son regard sur les écosystèmes de soins collectifs et elle étudie les stratégies de résistances développées à travers la création artistique.\\n\\nElle a notamment documenté des pratiques collectives au sein des scènes artistiques du Hip Hop, du double dutch et du graffiti en France et aux Etats-Unis. En produisant et en rassemblant des archives sur ces différentes scènes, Pascale Obolo participe à conserver et à transmettre la mémoire de groupes et d’histoires invisibilisées.\\n\\nAu-delà des films et des expositions, elle est également à l’origine de pratiques indépendantes et militantes avec Afrikadaa, à la fois revue, association et laboratoire intellectuel et artistique. Afrikadaa « a pour but de promouvoir et de développer l’art et les artistes issus ou en lien avec le continent africain et ses diasporas (1)» et de faciliter l’accès à l’art notamment à travers une programmation d’ateliers collectifs. Elle est aussi directrice de l’African Art Book Fair, foire d’édition indépendante « dédiée à la création contemporaine du continent africain et des diasporas (2)».\\n\\n(1) : Afrikadaa. « Qui sommes-nous ? ». Page consultée le 7 juillet 2025. \\nhttp://www.afrikadaa.com/p/qui-sommes-us.htmlno\\n\\n(2) : African art book fair. « About AABF ». Page consultée le 7 juillet 2025. \\nhttps://africanartbookfair.com/about/\\n\\nSources :\\n\\nAfrican art book fair. « About AABF ». Page consultée le 7 juillet 2025. \\nhttps://africanartbookfair.com/about/\\n\\nAfrikadaa. « Qui sommes-nous ? ». Page consultée le 7 juillet 2025. \\nhttp://www.afrikadaa.com/p/qui-sommes-us.htmlno\\n\\nVilla Albertine. « Pascale Obolo ». Page consultée le 7 juillet 2025. \\nhttps://villa-albertine.org/va/fr/residents/pascale-obolo/\\n\\nThéâtre de l’usine. « Pascale Obolo ». Page consultée le 7 juillet 2025. \\nhttps://www.theatredelusine.ch/artiste/pascale-obolo/\\n\",\"en\":\"Pascale Obolo is an independent exhibition curator, filmmaker and researcher. She is also the editor-in-chief of the onl
