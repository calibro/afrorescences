ine journal Afrikadaa and a member of the CINÉASTES NON ALIGNÉES collective. Her work is part of a critical and decolonial reflection on history, images and modes of knowledge transmission and pays particular attention to archives as artistic and political tools. At the crossroads of research, creation and activism, she challenges dominant narratives and strives to revitalize marginalized memories through photography, video, performance, music and publishing.\\nFor Obolo, exhibiting is above all a collective act. She conceives of curation as a dialogic, co-constructive practice where the exhibition becomes a space for social and sensory transformation. Her artistic and curatorial work questions the visual and cultural representations of political and economic history by employing numerous artistic mediums and tools. She emphasizes the audience’s shared, physical experience as well as the representation of marginalized bodies through museological and narrative devices.\\nObolo is the founder and director of the African Art Book Fair, held during the Dakar Biennale, and co-director of Miss Read in Berlin. She champions independent and socially engaged publishing. She also co-directs LABO Bénin, a new curatorial training program hosted by La Grande Place Bénin in partnership with the Institut français du Bénin and the ADAC.\\n\\nSources consulted: \\n\\nAfrican Art Book Fair. “About AABF.” Accessed July 7, 2025. \\nafricanartbookfair.com/about\\n\\nAfrikadaa. “Qui sommes-nous ?” Accessed July 7, 2025. \\nafrikadaa.com/p/qui-sommes-us.htmlno\\n\\nVilla Albertine. “Pascale Obolo.” Accessed July 7, 2025. \\nvilla-albertine.org/va/fr/residents/pascale-obolo\\n\\nThéâtre de l’usine. “Pascale Obolo.” Accessed July 7, 2025. \\ntheatredelusine.ch/artiste/pascale-obolo\\n\\n\\n\"}},\"id\":{\"value\":\"P32\"},\"interviewEvents\":{\"value\":[\"Les révoltes silencieuses\",\"Soirée Nos luttes - Sharing Stories (Zanele Muholi)\",\"African Art Book Fair 2024 \"]},\"interviewFavorites\":{\"value\":\"bell hooks, Ain’t I a Woman, 1981 (livre)\\n\\nLeïla Cukierman, Gerty Dambury et Françoise Vergès, Décolonisons les arts !, 2018 (livre)\\n\\nLa culture hip-hop des années 1980, et en particulier le double dutch\\n\",\"translation\":{\"fr\":\"bell hooks, Ain’t I a Woman, 1981 (livre)\\n\\nLeïla Cukierman, Gerty Dambury et Françoise Vergès, Décolonisons les arts !, 2018 (livre)\\n\\nLa culture hip-hop des années 1980, et en particulier le double dutch\\n\",\"en\":\"bell hooks. Ain’t I a Woman, 1981 (book)\\nLeïla Cukierman, Gerty Dambury and Françoise Vergès. Décolonisons les arts !, 2018 (book)\\n1980s hip-hop culture, particularly Double Dutch\\n\"}},\"interviewQuestion\":{\"value\":\"Comment créer des espaces où l’écoute, le partage et l’expérience corporelle permettent à des histoires marginalisées de se dire autrement ?\",\"translation\":{\"fr\":\"Comment créer des espaces où l’écoute, le partage et l’expérience corporelle permettent à des histoires marginalisées de se dire autrement ?\",\"en\":\"How can we create spaces where listening, sharing and physical experience allow marginalized stories to be told differently? \\n\\n\"}},\"credits\":{\"value\":\"Vue de Acte editorizl: Politics of sound, 2025, MEP, Paris, France. Crédit photo: Afrikadaa\",\"translation\":{\"fr\":\"Vue de Acte editorizl: Politics of sound, 2025, MEP, Paris, France. Crédit photo: Afrikadaa\",\"en\":\"View of Acte editorizl: Politics of sound, 2025 MEP, Paris, France. Credit photo: Afrikadaa\"}},\"collectives\":{\"value\":[\"Afrikadaa\",\"CINÉASTES NON ALIGNÉES\"],\"mutiple\":true}},{\"name\":{\"value\":\"Mawena\"},\"surname\":{\"value\":\"Yehouessi\"},\"roles\":{\"value\":[\"Commissaire d'exposition\",\"Chercheur.e\",\"Auteur.ice\",\"Artiste\"],\"translation\":{\"fr\":[\"Commissaire d'exposition\",\"Chercheur.e\",\"Auteur.ice\",\"Artiste\"],\"en\":[\"Curator\",\"Researcher\",\"Author\",\"Artist\"]}},\"activities\":{\"value\":[\"curation\",\"recherche\",\"écriture\",\"collage\",\"cinéma\",\"pratique collective\"],\"translation\":{\"fr\":[\"curation\",\"recherche\",\"écriture\",\"collage\",\"cinéma\",\"pratique collective\"],\"en\":[\"curation\",\"research\",\"writing\",\"collage\",\"filmmaking\",\"collective practice\"]}},\"birthYear\":{\"value\":\"1990-01-01T00:00:00.000Z\"},\"citiesOfActivity\":{\"value\":[\"Paris\",\"Nice\"]},\"placesOfFormation\":{\"value\":[\"Villa Arson Nice\",\"Université Paris 8 Vincennes - Saint-Denis\",\"Università di Bologna\",\"Université Paris 1 Panthéon - Sorbonne\"]},\"link\":{\"value\":\"https://mawenayehouessi.fr/\"},\"biography\":{\"value\":\"Mawena Yehouessi est une praticienne et une autrice des champs de la culture. Entre curation, recherche et collage, elle navigue au sein de l’art contemporain en pratiquant différentes disciplines non fixées.\\nElle explore dans sa démarche les questions de représentation identitaire et d’afrofuturisme, ainsi que les méthodologies de création et d’émancipation collectives. L’indiscipline et la transdisciplinarité se trouvent au cœur de ses recherches.\\n\\nSes pratiques, majoritairement collaboratives, prennent des formes hybrides entre créations visuelles et numériques, réalisations de films, écriture poétique, traduction, pédagogie et danse improvisée. Grâce à des espaces-temps tels que les expositions, les programmations festives ou les ateliers, elle invite d’autres practicien.nes à cocréer ensemble.\\n\\nMawena Yehouessi a soutenu sa thèse, Poïéthiques afrofuturistes : Trimer trames à l’intersection du collage et de la curation, en 2024 avec la Villa Arson et l’Université de Côte d’Azur à Nice. Ses recherches doctorales s’inscrivent dans la continuité de ses diverses pratiques.\\nSon processus créatif prend notamment ancrage dans ses études en littérature, en philosophie et en danse contemporaine.\\n\\nFaisant face à un manque de représentation des personnes noires dans le champ de la culture en France, elle co-fonde en 2015 le collectif Black(s) to the Future. Ce projet a été conçu comme un laboratoire d’expérimentation collective afin de se raconter et de participer à une vie culturelle plus inclusive, durable et décomplexée.\\n\\nSources :\\n\\nUniversité Côte d’Azur. « Mme Mawena Yehouessi ». Page consultée le 18 mai 2025.\\nhttps://univ-cotedazur.fr/mme-mawena-yehouessi\\n\\nMawenayehouessi. « Bio / CV ». Page consultée le 18 mai 2025. https://mawenayehouessi.fr/MYAbout\\n\\nAf-flux Biennale. « Yehouessi ». Page consultée le 18 mai 2025. https://www.affluxbiennale.org/second-edition/\\nBlack(s) to the Future. « Author: Mawena Yehouessi ». Page consultée le 18 mai 2025.\\nhttps://blackstothefuture.com/author/mawena/\\n\\nBlack(s) to the Future. « A propos ». Page consultée le 18 mai 2025. https://blackstothefuture.com/a-propos/\\n\\nYehouessi, Mawena. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 8 juillet 2024.\\n\",\"translation\":{\"fr\":\"Mawena Yehouessi est une praticienne et une autrice des champs de la culture. Entre curation, recherche et collage, elle navigue au sein de l’art contemporain en pratiquant différentes disciplines non fixées.\\nElle explore dans sa démarche les questions de représentation identitaire et d’afrofuturisme, ainsi que les méthodologies de création et d’émancipation collectives. L’indiscipline et la transdisciplinarité se trouvent au cœur de ses recherches.\\n\\nSes pratiques, majoritairement collaboratives, prennent des formes hybrides entre créations visuelles et numériques, réalisations de films, écriture poétique, traduction, pédagogie et danse improvisée. Grâce à des espaces-temps tels que les expositions, les programmations festives ou les ateliers, elle invite d’autres practicien.nes à cocréer ensemble.\\n\\nMawena Yehouessi a soutenu sa thèse, Poïéthiques afrofuturistes : Trimer trames à l’intersection du collage et de la curation, en 2024 avec la Villa Arson et l’Université de Côte d’Azur à Nice. Ses recherches doctorales s’inscrivent dans la continuité de ses diverses pratiques.\\nSon processus créatif prend notamment ancrage dans ses études en littérature, en philosophie et en danse contemporaine.\\n\\nFaisant face à un manque de représentation des personnes noires dans le champ de la culture en France, elle co-fonde en 2015 le collectif Black(s) to the Future. Ce projet a été conçu comme un laboratoire d’expérimentation collective afin de se raconter et de participer à une vie culturelle plus inclusive, durable et décomplexée.\\n\\nSources :\\n\\nUniversité Côte d’Azur. « Mme Mawena Yehouessi ». Page consultée le 18 mai 2025.\\nhttps://univ-cotedazur.fr/mme-mawena-yehouessi\\n\\nMawenayehouessi. « Bio / CV ». Page consultée le 18 mai 2025. https://mawenayehouessi.fr/MYAbout\\n\\nAf-flux Biennale. « Yehouessi ». Page consultée le 18 mai 2025. https://www.affluxbiennale.org/second-edition/\\nBlack(s) to the Future. « Author: Mawena Yehouessi ». Page consultée le 18 mai 2025.\\nhttps://blackstothefuture.com/author/mawena/\\n\\nBlack(s) to the Future. « A propos ». Page consultée le 18 mai 2025. https://blackstothefuture.com/a-propos/\\n\\nYehouessi, Mawena. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 8 juillet 2024.\\n\",\"en\":\"Mawena Yehouessi is a practitioner and author in the field of culture. She navigates contemporary art through diverse and fluid disciplines such as curation, research and collage. \\nShe explores issues of identity representation and Afrofuturism, alongside methodologies of collective creation and emancipation. Indisciplinarity and transdisciplinarity lie at the heart of her research.\\nHer predominantly collaborative practice takes hybrid forms, combining visual and digital art, filmmaking, poetic writing, translation, pedagogy and improvised dance. Through exhibitions, festivals and workshops, she invites other practitioners to co-create.\\nIn 2024, Yehouessi defended her thesis, entitled “Poïéthiques afrofuturistes. Trimer trames à l’intersection du collage et de la curation” (Afrofuturist Poetics. Weaving wefts at the intersection of collage and curation), developed at the Villa Arson and the University of Côte d’Azur in Nice. This doctoral research is a continuation of her various practices.\\nHer creative process is rooted in her studies in literature, philosophy and contemporary dance. Confronted with the underrepresentation of Black people in France’s cultural sector, she co-founded the Black(s) to the Future collective in 2015. This initiative serves as an experimental laboratory for sharing stories and participating in a more inclusive, sustainable and vibrant cultural landscape.\\n\\nSources consulted: \\n\\nUniversité Côte d’Azur. “Mme Mawena Yehouessi.” Accessed May 18, 2025. univ-cotedazur.fr/mme-mawena-yehouessi\\n\\nMawenayehouessi. “Bio / CV.” Accessed May 18, 2025. mawenayehouessi.fr/MYAbout\\n\\nAf-flux Biennale. “Yehouessi.” Accessed May 18, 2025. affluxbiennale.org/second-edition.\\n\\nBlack(s) to the Future. “Auteur/autrice : Mawena Yehouessi.” Accessed May 18, 2025. blackstothefuture.com/author/mawenaBlack(s) to the Future. “À propos.” Accessed May 18, 2025. blackstothefuture.com/a-propos\\n\\nYehouessi, Mawena. Interview conducted by Abigail Celis, Célia Mbas and Johanna Montlouis-Gabriel. July 8, 2024.\\n\\n\\n\\n\"}},\"id\":{\"value\":\"P40\"},\"interviewEvents\":{\"value\":[\"B(S)TTF #1\",\"B(S)TTF #2\",\"NSNAMDLM: Nous sommes né.e.s au milieu de la mer\",\"Berlinale 2022\"]},\"interviewFavorites\":{\"value\":\"Sun ra, Space Is the Place, 1974 (album de musique)\\n\\nBlack Audio Film Collective, Handsworth Songs, 1986 (film-documentaire)\\n\\nFred Moten et Staphano Harney, The Undercommons, 2013 (livre)\",\"translation\":{\"fr\":\"Sun ra, Space Is the Place, 1974 (album de musique)\\n\\nBlack Audio Film Collective, Handsworth Songs, 1986 (film-documentaire)\\n\\nFred Moten et Staphano Harney, The Undercommons, 2013 (livre)\",\"en\":\"Sun Ra. Space Is the Place, 1974 (music album)\\nBlack Audio Film Collective. Handsworth Songs, 1986 (documentary film)\\nFred Moten and Staphano Harney. The Undercommons, 2013 (book)\\n\\n\"}},\"interviewQuestion\":{\"value\":\"Comment composer des formes (artistiques, curatoriales, discursives) capables d’organiser des relations et des héritages minorisés sans les unifier, les moraliser ou les rendre extractibles ?\",\"translation\":{\"fr\":\"Comment composer des formes (artistiques, curatoriales, discursives) capables d’organiser des relations et des héritages minorisés sans les unifier, les moraliser ou les rendre extractibles ?\",\"en\":\"How can we create artistic, curatorial or discursive forms capable of organizing marginalized relationships and legacies without unifying, moralizing or extracting them?\"}},\"credits\":{\"value\":\"Still du teaser de NSNAMDLM, 2023. Crédits : Juan Ferrari, Fallon Mayanja, Esther Meunier Corfdyr, Nicolas Pirus, Sandar Tun Tun and Mawena Yehouessi.\",\"translation\":{\"fr\":\"Still du teaser de NSNAMDLM, 2023. Crédits : Juan Ferrari, Fallon Mayanja, Esther Meunier Corfdyr, Nicolas Pirus, Sandar Tun Tun and Mawena Yehouessi.\",\"en\":\"Film still from NSNAMDLM’s teaser, 2023. Credits : Juan Ferrari, Fallon Mayanja, Esther Meunier Corfdyr, Nicolas Pirus, Sandar Tun Tun and Mawena Yehouessi.\"}},\"collectives\":{\"value\":[\"Black(s) to the Future\"],\"mutiple\":true}},{\"name\":{\"value\":\"Alexia \"},\"surname\":{\"value\":\"Fiasco\"},\"roles\":{\"value\":[\"Artiste\",\"Commissaire d'exposition\"],\"translation\":{\"fr\":[\"Artiste\",\"Commissaire d'exposition\"],\"en\":[\"Artist\",\"Curator\"]}},\"activities\":{\"value\":[\"photographie\",\"vidéo\",\"pratique collective\"],\"translation\":{\"fr\":[\"photographie\",\"vidéo\",\"pratique collective\"],\"en\":[\"photography\",\"video\",\"collective practice\"]}},\"birthYear\":{\"value\":\"1990-01-01T00:00:00.000Z\"},\"citiesOfActivity\":{\"value\":[\"Paris\",\"Pierrefitte-sur-Seine\"]},\"placesOfFormation\":{\"value\":[\"OKS Berlin\"]},\"link\":{\"value\":\"instagram.com/alexiafiasco\"},\"biography\":{\"value\":\"Alexia Fiasco est une artiste photographe, curatrice et porteuse de projets dans le champ de l’éducation populaire. \\n\\nSa pratique explore la notion d’identité, en particulier dans son travail avec des personnes marginalisées. \\n\\nL’artiste emprunte au registre documentaire, tout en intégrant des éléments plus flous et poétiques. C’est le cas de ses transferts de portraits d’habitants de la cité des Fauvettes à Pierrefitte-sur-Seine sur des matériaux divers qui représentent la cité (une brique d’immeuble, un capot de voiture…) et renvoient aux thèmes du chez-soi, de la mémoire et du temps qui passe. Alexia Fiasco travaille la notion de dignité, et cherche ainsi à donner aux habitants un moyen de raconter leur histoire.\\n\\nAlexia Fiasco transmet sa pratique à travers des expositions, un travail important de médiation et des projets menés sur le territoire de Seine-Saint-Denis, notamment avec l’association Fauvettes-Maestra, qu’elle codirige. Elle est également impliquée dans le collectif Filles de Blédards, qui regroupe une communauté de jeunes artistes  issu.e.s de l’immigration. En collaborant avec d’autres projets associatifs comme les événements et journées de réflexion des Chichas de la Pensée au Centre Pompidou ,elle amplifie le travail sur la mémoire des Fauvettes. Sa pratique artistique est ainsi entrelacée avec les projets socio-culturels qu’elle mène.\\n\\n\\nSources :\\n\\nHaxo, Frédéric, « Alexia Fiasco, La Carte De Ses Territoire(S). ». Seine-Saint-Denis, 2 février 2024.\\nhttps://seinesaintdenis.fr/actualite/culture-patrimoine/Alexia-Fiasco-la-carte-de-ses-Territoires/\\n\\nGalerie Gomis. « Alexia Fiasco  - Works. ». Page consultée le 27 avril 2025.  https://galeriegomis.com/artists/43-alexia-fiasco/works/\\n\\nWeidmann, Ericka, « Immersion artistique au coeur de l’histoire des banlieues au Palais de la Porte Dorée ». Picto, 17 avril 2025. https://www.picto.fr/2025/immersion-artistique-au-coeur-de-lhistoire-des-banlieues-au-palais-de-la-porte-doree/\\n\\nFiasco, Alexia. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 8 juillet 2024.\",\"translation\":{\"fr\":\"Alexia Fiasco est une artiste photographe, curatrice et porteuse de projets dans le champ de l’éducation populaire. \\n\\nSa pratique explore la notion d’identité, en particulier dans son travail avec des personnes marginalisées. \\n\\nL’artiste emprunte au registre documentaire, tout en intégrant des éléments plus flous et poétiques. C’est le cas de ses transferts de portraits d’habitants de la cité des Fauvettes à Pierrefitte-sur-Seine sur des matériaux divers qui représentent la cité (une brique d’immeuble, un capot de voiture…) et renvoient aux thèmes du chez-soi, de la mémoire et du temps qui passe. Alexia Fiasco travaille la notion de dignité, et cherche ainsi à donner aux habitants un moyen de raconter leur histoire.\\n\\nAlexia Fiasco transmet sa pratique à travers des expositions, un travail important de médiation et des projets menés sur le territoire de Seine-Saint-Denis, notamment avec l’association Fauvettes-Maestra, qu’elle codirige. Elle est également impliquée dans le collectif Filles de Blédards, qui regroupe une communauté de jeunes artistes  issu.e.s de l’immigration. En collaborant avec d’autres projets associatifs comme les événements et journées de réflexion des Chichas de la Pensée au Centre Pompidou ,elle amplifie le travail sur la mémoire des Fauvettes. Sa pratique artistique est ainsi entrelacée avec les projets socio-culturels qu’elle mène.\\n\\n\\nSources :\\n\\nHaxo, Frédéric, « Alexia Fiasco, La Carte De Ses Territoire(S). ». Seine-Saint-Denis, 2 février 2024.\\nhttps://seinesaintdenis.fr/actualite/culture-patrimoine/Alexia-Fiasco-la-carte-de-ses-Territoires/\\n\\nGalerie Gomis. « Alexia Fiasco  - Works. ». Page consultée le 27 avril 2025.  https://galeriegomis.com/artists/43-alexia-fiasco/works/\\n\\nWeidmann, Ericka, « Immersion artistique au coeur de l’histoire des banlieues au Palais de la Porte Dorée ». Picto, 17 avril 2025. https://www.picto.fr/2025/immersion-artistique-au-coeur-de-lhistoire-des-banlieues-au-palais-de-la-porte-doree/\\n\\nFiasco, Alexia. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 8 juillet 2024.\",\"en\":\"Alexia Fiasco is a photographer, curator and project leader in the field of popular education. \\n\\nHer practice explores the concept of identity, particularly as it relates to marginalized people. \\n\\nThe artist draws from documentary photography vernacular while incorporating indeterminate and poetic elements. For example, in her work on the Fauvettes housing project in Pierrefitte-sur-Seine, she transfers portraits of residents onto materials representing the housing project, such as bricks from buildings or car hoods that evoke themes of home, memory and the passing of time. Through her work, she explores the notion of dignity and seeks to give residents a means of telling their stories.\\n\\nFiasco shares her work through exhibitions, extensive outreach work and projects carried out in the Seine-Saint-Denis area, notably with the Fauvettes-Maestra association, which she co-directs. She is also involved in the Filles de Blédards collective, which brings together a community of young artists from immigrant backgrounds. Through collaborations with community projects such as the Chichas de la pensée events and symposia at the Centre Pompidou, she expands upon her memory-related work begun with the Fauvettes project. In this way, her artistic practice is intertwined with the socio-cultural projects she leads. \\n\\nSources consulted:\\n\\nHaxo, Frédéric, « Alexia Fiasco, La Carte De Ses Territoire(S). ». Seine-Saint-Denis, February 2, 2024.\\nhttps://seinesaintdenis.fr/actualite/culture-patrimoine/Alexia-Fiasco-la-carte-de-ses-Territoires/\\n\\nGalerie Gomis. « Alexia Fiasco  - Works. ». Accessed April 27, 2025.  https://galeriegomis.com/artists/43-alexia-fiasco/works/\\n\\nWeidmann, Ericka, « Immersion artistique au coeur de l’histoire des banlieues au Palais de la Porte Dorée ». Picto, April 17, 2025. https://www.picto.fr/2025/immersion-artistique-au-coeur-de-lhistoire-des-banlieues-au-palais-de-la-porte-doree/\\n\\nFiasco, Alexia. Interview conducted by Abigail Celis, Célia Mbas and Johanna Montlouis-\\nGabriel. July 8, 2024.\"}},\"id\":{\"value\":\"P14\"},\"interviewEvents\":{\"value\":[\"La Saison des Fauvettes : Dernier chapitre\",\"Nos vies, vos tours\",\"Festival Identifié.e.s ?\"]},\"interviewFavorites\":{\"value\":\"Les rencontres au sein de La Colonie (espace/projet fondé par Kader Attia)\\n\\nL’ensemble de l’œuvre de Maryse Condé (livres)\\n\\nLes portraits photographiques sociaux participatifs de Roger Ballen (photographies)\\n\\nLe musée précaire Albinet, Thomas Hirschhorn (espace/projet)\\n\",\"translation\":{\"fr\":\"Les rencontres au sein de La Colonie (espace/projet fondé par Kader Attia)\\n\\nL’ensemble de l’œuvre de Maryse Condé (livres)\\n\\nLes portraits photographiques sociaux participatifs de Roger Ballen (photographies)\\n\\nLe musée précaire Albinet, Thomas Hirschhorn (espace/projet)\\n\",\"en\":\"Gathering that took place at La Colonie, (space/project founded by Kader Attia)\\n\\nThe entire body of work by Maryse Condé (books)\\n\\nRoger Ballen’s participatory social photographic portraits (photographs)\\n\\nMusée Précaire Albinet, Thomas Hirschhorn (space/project)\"}},\"interviewQuestion\":{\"value\":\"Comment préserver l’agentivité collective des récits effacés face aux processus d’institutionnalisation et d’instrumentalisation culturelle ?\",\"translation\":{\"fr\":\"Comment préserver l’agentivité collective des récits effacés face aux processus d’institutionnalisation et d’instrumentalisation culturelle ?\",\"en\":\"How can we preserve the collective agency of erased narratives in the face of institutionalization and cultural instrumentalization?\"}},\"credits\":{\"value\":\"Vue de l’oeuvre Melissa, Les Dernières Fauvettes, 2023. Impression sur papier, vernis sur brique de la Cité. Crédit : Alexia Fiasco\",\"translation\":{\"fr\":\"Vue de l’oeuvre Melissa, Les Dernières Fauvettes, 2023. Impression sur papier, vernis sur brique de la Cité. Crédit : Alexia Fiasco\",\"en\":\"View of the work Melissa, Les Dernières Fauvettes, 2023. Print on paper, varnish on a brick of the Cité. Credit : Alexia Fiasco.\"}},\"collectives\":{\"value\":[\"Filles de Blédards\",\"Maestra Les Fauvettes\"],\"mutiple\":true}},{\"name\":{\"value\":\"Carla\"},\"surname\":{\"value\":\"Gueye\"},\"roles\":{\"value\":[\"Artiste\"],\"translation\":{\"fr\":[\"Artiste\"],\"en\":[\"Artist\"]}},\"activities\":{\"value\":[\"installation\",\"sculpture\"],\"translation\":{\"fr\":[\"installation\",\"sculpture\"],\"en\":[\"installation\",\"sculpture\"]}},\"birthYear\":{\"value\":\"1997-01-01T00:00:00.000Z\"},\"citiesOfActivity\":{\"value\":[\"Paris\",\"Dakar\"]},\"placesOfFormation\":{\"value\":[\"ENSA Paris-Cergy\"]},\"link\":{\"value\":\"https://www.instagram.com/carlaconfess/\"},\"biography\":{\"value\":\"Carla Gueye est une artiste pluridisciplinaire basée à Paris, diplômée d’un master de l’École nationale supérieure d’arts de Paris-Cergy École d’art de Cergy.\\n \\nL’artiste interroge les notions d’intimité et de transculturalité, en explorant la manière dont elles se manifestent et résonnent au sein du contexte familial. Gueye propose une réflexion sur la complexité des identités et des relations affectives, ainsi que sur les expériences issues des rencontres et des tensions entre différentes cultures. En s’ouvrant à l’altérité, son œuvre dévoile également des dimensions émotionnelles, artistiques et socioécologiques.\\n \\nÀ travers l’utilisation de matériaux tels que la chaux et l’argile, l’artiste explore leurs propriétés physiques : elle construit des récits qui reconfigurent les savoirs et les imaginaires culturels. La mémoire, la figure féminine et des processus liés à l’excavation ou à la réappropriation de récits en partie confisqués sont au centre de sa démarche. Son œuvre devient ainsi un moyen de réinscrire et de comprendre sa propre histoire. Ses créations se font espaces sensibles de dialogue et de réflexion autour de la culture, de l’identité et des réseaux complexes qui façonnent l’expérience humaine.\\n \\nCarla Gueye travaille en 2023 à Dakar auprès du designer Bibi Seck, fondateur du laboratoire de design Dakar Next. En 2025, l’artiste poursuit ses recherches autour de la poterie traditionnelle auprès de Seyni Awa Camara lors d’une résidence en Casamance.\\n\\nSources :\\n\\nAteliers Médicis. « Clara Gueye est lauréate de la mention Ateliers Médicis du prix COAL 2024 ». Page consultée le 15 mai 2025. https://www.ateliersmedicis.fr/article/clara-gueye-est-laureate-de-la-mention-ateliers-medicis-du-prix-coal-2024-32519\\n\\nLe quotidien “Horizon – Carla Guèye, Plasticienne : «Dans L’espace Public, Il Y a Une Omniprésence Du Corps Masculin ; J’ai Eu Envie De Redonner Une Place Au Corps Féminin»”. Page consultée le 15 mai 2025.\\nhttps://lequotidien.sn/horizon-carla-gueye-plasticienne-dans-lespace-public-il-y-a-une-omnipresence-du-corps-masculin-jai-eu-envie-de-redonner-une-place-au-corps-feminin/\\n\\nGueye, Carla. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 9 juillet 2024.\",\"translation\":{\"fr\":\"Carla Gueye est une artiste pluridisciplinaire basée à Paris, diplômée d’un master de l’École nationale supérieure d’arts de Paris-Cergy École d’art de Cergy.\\n \\nL’artiste interroge les notions d’intimité et de transculturalité, en explorant la manière dont elles se manifestent et résonnent au sein du contexte familial. Gueye propose une réflexion sur la complexité des identités et des relations affectives, ainsi que sur les expériences issues des rencontres et des tensions entre différentes cultures. En s’ouvrant à l’altérité, son œuvre dévoile également des dimensions émotionnelles, artistiques et socioécologiques.\\n \\nÀ travers l’utilisation de matériaux tels que la chaux et l’argile, l’artiste explore leurs propriétés physiques : elle construit des récits qui reconfigurent les savoirs et les imaginaires culturels. La mémoire, la figure féminine et des processus liés à l’excavation ou à la réappropriation de récits en partie confisqués sont au centre de sa démarche. Son œuvre devient ainsi un moyen de réinscrire et de comprendre sa propre histoire. Ses créations se font espaces sensibles de dialogue et de réflexion autour de la culture, de l’identité et des réseaux complexes qui façonnent l’expérience humaine.\\n \\nCarla Gueye travaille en 2023 à Dakar auprès du designer Bibi Seck, fondateur du laboratoire de design Dakar Next. En 2025, l’artiste poursuit ses recherches autour de la poterie traditionnelle auprès de Seyni Awa Camara lors d’une résidence en Casamance.\\n\\nSources :\\n\\nAteliers Médicis. « Clara Gueye est lauréate de la mention Ateliers Médicis du prix COAL 2024 ». Page consultée le 15 mai 2025. https://www.ateliersmedicis.fr/article/clara-gueye-est-laureate-de-la-mention-ateliers-medicis-du-prix-coal-2024-32519\\n\\nLe quotidien “Horizon – Carla Guèye, Plasticienne : «Dans L’espace Public, Il Y a Une Omniprésence Du Corps Masculin ; J’ai Eu Envie De Redonner Une Place Au Corps Féminin»”. Page consultée le 15 mai 2025.\\nhttps://lequotidien.sn/horizon-carla-gueye-plasticienne-dans-lespace-public-il-y-a-une-omnipresence-du-corps-masculin-jai-eu-envie-de-redonner-une-place-au-corps-feminin/\\n\\nGueye, Carla. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 9 juillet 2024.\",\"en\":\"Carla Gueye is a multidisciplinary artist based in Paris who earned her master’s degree from the École nationale supérieure d’arts de Paris-Cergy École d’art de Cergy.\\n \\nGueye questions notions of intimacy and transculturality, exploring how they manifest and resonate within the family context. Her work invites reflection on the complexity of identities and emotional relationships, as well as the experiences arising from encounters and tensions between cultures. By embracing otherness, she uncovers emotional, artistic and socio-ecological dimensions.\\n \\nWorking with materials such as lime and clay, Gueye explores their physical properties to construct narratives that challenge and reconfigure cultural knowledge and imaginaries. Central to her practice are memory, the female figure and processes of excavating or reappropriating partially suppressed narratives. In this way, her work becomes a means of rewriting and understanding her own history, creating sensitive spaces for dialogue and reflection on culture, identity and the intricate networks shaping human experience.\\n \\nIn 2023, Gueye collaborated with Bibi Seck, founder of the Dakar Next design laboratory. In 2025, she continued her research into traditional pottery during a residency in Casamance with Seyni Awa Camara.\\n\\nSources consulted: \\n\\nAteliers Médicis. “Clara Gueye est lauréate de la mention Ateliers Médicis du prix COAL 2024.” Accessed May 15, 2025. ateliersmedicis.fr/article/clara-gueye-est-laureate-de-la-mention-ateliers-medicis-du-prix-coal-2024-32519 \\n\\nLe Quotidien. “Horizon – Carla Guèye, plasticienne : “Dans l’espace public, il y a une omniprésence du corps masculin; j’ai eu envie de redonner une place au corps féminin’“ Accessed May 15, 2025.\\nlequotidien.sn/horizon-carla-gueye-plasticienne-dans-lespace-public-il-y-a-une-omnipresence-du-corps-masculin-jai-eu-envie-de-redonner-une-place-au-corps-feminin\\n\\nGueye, Carla. Interview conducted by Abigail Celis, Célia Mbas and Johanna Montlouis-Gabriel. July 9, 2024.\"}},\"id\":{\"value\":\"P23\"},\"interviewEvents\":{\"value\":[\"36e Biennale de São Paulo\",\"Expo 100% La Villette 2024\",\"Dans la chambre je suis ...\"]},\"interviewFavorites\":{\"value\":\"Djaïli Amadou Amal, Les impatientes, 2020 (livre)\\n\\nAxelle Jah Njiké, Me My Sexe and I® (podcast)\\n\\nKpénahi Traoré, Bas les pattes! (podcast)\\n\",\"translation\":{\"fr\":\"Djaïli Amadou Amal, Les impatientes, 2020 (livre)\\n\\nAxelle Jah Njiké, Me My Sexe and I® (podcast)\\n\\nKpénahi Traoré, Bas les pattes! (podcast)\\n\",\"en\":\"Djaïli Amadou Amal. Les impatientes, 2020 (book)\\nAxelle Jah Njiké. Me My Sexe and I® (podcast)\\nKpénahi Traoré. Bas les pattes ! (podcast)\"}},\"interviewQuestion\":{\"value\":\"Comment faire apparaître l’invisible dans ce qui est présent ?\",\"translation\":{\"fr\":\"Comment faire apparaître l’invisible dans ce qui est présent ?\",\"en\":\"How can we reveal the invisible in what is present?\\n\\n\"}},\"credits\":{\"value\":\"Vue de la série Sisters and I, 2022, Dakar, Sénégal. Crédit photo: Ibra Wane\",\"translation\":{\"fr\":\"Vue de la série Sisters and I, 2022, Dakar, Sénégal. Crédit photo: Ibra Wane\",\"en\":\"View of the series Sisters and I, 2022, Dakar, Sénégal. Photo credit: Ibra Wane\"}},\"collectives\":{\"value\":[\"NMT\"],\"mutiple\":true}},{\"name\":{\"value\":\"Oulimata\"},\"surname\":{\"value\":\"Gueye\"},\"roles\":{\"value\":[\"Commissaire d'exposition\",\"Critique\",\"Historien.ne de l'art\"],\"translation\":{\"fr\":[\"Commissaire d'exposition\",\"Critique\",\"Historien.ne de l'art\"],\"en\":[\"Curator\",\"Critic\",\"Art historian\",\"Researcher\"]}},\"activities\":{\"value\":[\"curation\",\"critique\",\"pratique collective\",\"écriture\"],\"translation\":{\"fr\":[\"curation\",\"critique\",\"pratique collective\",\"écriture\"],\"en\":[\"curation\",\"critic\",\"collective practice\",\"writing\"]}},\"birthYear\":{\"value\":null},\"citiesOfActivity\":{\"value\":[\"Lyon\",\"Paris\"]},\"placesOfFormation\":{\"value\":[\"Université Paris 8 Vincennes - Saint-Denis\",\"École des Hautes Etudes en Sciences Sociales\"]},\"link\":{\"value\":\"https://www.instagram.com/oulimata.gueye/\"},\"biography\":{\"value\":\"Oulimata Gueye est chercheuse, commissaire d’exposition indépendante et enseignante en art. Sa démarche curatoriale se fonde sur un travail de recherche à l’intersection des cultures numériques, de l’art contemporain, des cultures populaires, des littératures et de la micropolitique.\\n\\nElle a participé à de nombreux projets internationaux dans le champ des cultures électroniques, de la performance, des pratiques sonores expérimentales et des arts des médias. Ses recherches actuelles portent sur l’historiographie des sciences et des techniques au regard de la place de l’Afrique et des pratiques artistiques décoloniales. Elle revendique une pratique reposant sur une éthique du travail collectif et horizontal visant à garantir la pluralité, la reconnaissance et la valorisation des voix impliquées.\\nElle est membre du comité scientifique de l’Édouard Glissant Art Fund, du programme Women in AI and New Media Art d’AWARE, ainsi que du Conseil international d’orientation du Musée des Civilisations noires à Dakar.\\n\\nElle a également dirigé le programme de Post-diplôme art à l’École nationale supérieure des beaux-arts de Lyon de 2021 à 2025.\\nOulimata Gueye poursuit sa démarche collaborative, notamment en cofondant le Batofar, un lieu parisien consacré aux pratiques électroniques, aux cultures urbaines et aux nouvelles pratiques artistiques, et en codirigeant le festival nomade Infamous carousel, consacré à la performance, aux pratiques sonores expérimentales et aux arts des médias.\\n\\nBiographie fournie par Oulimata Gueye.\",\"translation\":{\"fr\":\"Oulimata Gueye est chercheuse, commissaire d’exposition indépendante et enseignante en art. Sa démarche curatoriale se fonde sur un travail de recherche à l’intersection des cultures numériques, de l’art contemporain, des cultures populaires, des littératures et de la micropolitique.\\n\\nElle a participé à de nombreux projets internationaux dans le champ des cultures électroniques, de la performance, des pratiques sonores expérimentales et des arts des médias. Ses recherches actuelles portent sur l’historiographie des sciences et des techniques au regard de la place de l’Afrique et des pratiques artistiques décoloniales. Elle revendique une pratique reposant sur une éthique du travail collectif et horizontal visant à garantir la pluralité, la reconnaissance et la valorisation des voix impliquées.\\nElle est membre du comité scientifique de l’Édouard Glissant Art Fund, du programme Women in AI and New Media Art d’AWARE, ainsi que du Conseil international d’orientation du Musée des Civilisations noires à Dakar.\\n\\nElle a également dirigé le programme de Post-diplôme art à l’École nationale supérieure des beaux-arts de Lyon de 2021 à 2025.\\nOulimata Gueye poursuit sa démarche collaborative, notamment en cofondant le Batofar, un lieu parisien consacré aux pratiques électroniques, aux cultures urbaines et aux nouvelles pratiques artistiques, et en codirigeant le festival nomade Infamous carousel, consacré à la performance, aux pratiques sonores expérimentales et aux arts des médias.\\n\\nBiographie fournie par Oulimata Gueye.\",\"en\":\"Oulimata Gueye is a researcher, independent curator and art educator. Her curatorial practice is grounded in research at the intersection of digital cultures, contemporary art, popular cultures, literature and micropolitics. She has participated in numerous international projects related to electronic culture, performance, experimental sound practices and media arts.\\n\\nCurrently, she is exploring Africa’s place in the historiography of science and technology as well as in decolonial artistic practices. Her work is guided by an ethic of collective and horizontal collaboration, aimed at ensuring the plurality, recognition and valorization of all voices involved.\\nShe serves on the scientific committee of the Édouard Glissant Art Fund, the AWARE Women in AI and New Media Art program, and the international advisory board of the Musée des Civilisations noires in Dakar. Gueye also\\ndirected the postgraduate art program at the École nationale supérieure des beaux-arts de Lyon from 2021 to 2025.\\nHer collaborative spirit led her to co-found Batofar, a Parisian art space dedicated to electronic practices, urban culture and new artistic practices.\\nShe also co-directed the nomadic festival Infamous Carousel, which champions performance, experimental sound practices and media arts.\\n\\nSources consulted:\\n\\nBiography provided by Oulimata Gueye.\"}},\"id\":{\"value\":\"P34\"},\"interviewEvents\":{\"value\":[\"Afrocyberféminismes\",\"UFA – Université des Futurs Africains\",\"Imaginaires numériques Afropixel #6\"]},\"interviewFavorites\":{\"value\":\"documenta X, sous la direction artistique de Catherine David, 1997 (exposition quinquennale)\\n \\nLes Biennales de Dakar\\n\\nSamir Boumediene, La colonisation du savoir : Une histoire des plantes médicinales du « Nouveau Monde » (1492-1750), 2016 (livre)\\n\\nValentin-Yves Mudimbe, L’invention de l’Afrique : Gnose, philosophie et ordre de la connaissance (1988), Présence africaine, 2021 (livre)\\n\",\"translation\":{\"fr\":\"documenta X, sous la direction artistique de Catherine David, 1997 (exposition quinquennale)\\n \\nLes Biennales de Dakar\\n\\nSamir Boumediene, La colonisation du savoir : Une histoire des plantes médicinales du « Nouveau Monde » (1492-1750), 2016 (livre)\\n\\nValentin-Yves Mudimbe, L’invention de l’Afrique : Gnose, philosophie et ordre de la connaissance (1988), Présence africaine, 2021 (livre)\\n\",\"en\":\"documenta X, under the artistic direction of Catherine David, 1997 (quinquennial art exhibition)\\n\\nLes Biennales de Dakar\\n\\nSamir Boumediene, La colonisation du savoir. Une histoire des plantes médicinales du « Nouveau Monde » (1492–1750), 2016 (book)\\n\\nValentin-Yves Mudimbe, L’invention de l’Afrique. Gnose, philosophie et ordre de la connaissance (1988), Présence africaine, 2021 (book)\"}},\"interviewQuestion\":{\"value\":\"Beaucoup de questions habitent mon travail de façon si intrinsèquement liée qu'il est difficile d'en extraire une seule, sans être réducteur : elles touchent au pouvoir et à son exercice, à l'égalité, à la justice et à la dignité, à la place de l'expérience comme exercice pratique du savoir, à la violence du capitalisme, à l'histoire coloniale et ses habits neufs, à la transmission, à l'éthique, à la subalternité, au fait d'être une femme Noire née sur le continent africain. \",\"translation\":{\"fr\":\"Beaucoup de questions habitent mon travail de façon si intrinsèquement liée qu'il est difficile d'en extraire une seule, sans être réducteur : elles touchent au pouvoir et à son exercice, à l'égalité, à la justice et à la dignité, à la place de l'expérience comme exercice pratique du savoir, à la violence du capitalisme, à l'histoire coloniale et ses habits neufs, à la transmission, à l'éthique, à la subalternité, au fait d'être une femme Noire née sur le continent africain. \",\"en\":\"Gueye explores a range of themes that are intrinsically intertwined, making it difficult to isolate any single one without oversimplifying. An underlying thread may be power and its exercise, equality, justice and dignity, the role of experience in applying knowledge, the violence of capitalism, colonial history\\nand its modern manifestations, transmission, ethics, subalternity, and the reality of being a Black woman born in Africa.\"}},\"credits\":{\"value\":\"Vue de l’exposition « UFA-Université des futurs africains », le Lieu Unique, 2021. Artistes: Russel Hlongwane, « Ifu Elimnyama (The Dark Cloud) », KapwaniKiwanga, \\\"Nursery\\\". Crédit photo: DavidGallard\",\"translation\":{\"fr\":\"Vue de l’exposition « UFA-Université des futurs africains », le Lieu Unique, 2021. Artistes: Russel Hlongwane, « Ifu Elimnyama (The Dark Cloud) », KapwaniKiwanga, \\\"Nursery\\\". Crédit photo: DavidGallard\",\"en\":\"View of the exhibition UFA-Université des futurs africains, le Lieu Unique, 2021. Artists: Russel Hlongwane, \\\"Ifu Elimnyama (The Dark Cloud)\\\", KapwaniKiwanga, \\\"Nursery\\\". Photo credit: David Gallard\"}},\"collectives\":{\"value\":[\"On Trade Off\",\"Start up Africa\",\"Collectif fondateur du Batofar\",\"Collectif dirigeant Infamous Carrousel\"],\"mutiple\":true}},{\"name\":{\"value\":\"Cindy\"},\"surname\":{\"value\":\"Olohou\"},\"roles\":{\"value\":[\"Commissaire d'exposition\",\"Critique\",\"Historien.ne de l'art\"],\"translation\":{\"fr\":[\"Commissaire d'exposition\",\"Critique\",\"Historien.ne de l'art\"],\"en\":[\"Curator\",\"Critic\",\"Art historian\"]}},\"activities\":{\"value\":[\"curation\",\"critique\"],\"translation\":{\"fr\":[\"curation\",\"critique\"],\"en\":[\"curation\",\"critic\"]}},\"birthYear\":{\"value\":\"1991-01-01T00:00:00.000Z\"},\"citiesOfActivity\":{\"value\":[\"Paris\",\"Dakar\",\"Bourg-la-Reine\"]},\"placesOfFormation\":{\"value\":[\"École du Louvre\",\"Université Paris-Sorbonne\"]},\"link\":{\"value\":\"https://www.instagram.com/cindy_olohou/\"},\"biography\":{\"value\":\"Cindy Olohou est commissaire d’exposition et critique d’art indépendante, spécialiste des scènes contemporaines d’Afrique et de ses diasporas. Depuis 2024, elle est responsable de la collection au Fonds régional d’art contemporain (FRAC) Île-de-France.\\n\\nElle a fondé en 2019 l’agence Wasanii Ya Leo, structure dédiée à la gestion de projets dans le champ de l’art contemporain africain, caribéen et diasporique. Bien que l’agence soit aujourd’hui fermée, elle a constitué un cadre important de réflexion et d’expérimentation curatoriale, nourrissant une pratique engagée et collaborative.\\n\\nCindy Olohou collabore régulièrement avec des institutions telles que le Musée du Quai Branly, le Musée de Lomé ou la Biennale de Dakar, en tant que commissaire indépendante ou consultante, notamment sur les enjeux de création contemporaine, de patrimonialisation et de transmission. Elle s’intéresse particulièrement aux pratiques artistiques issues de contextes postcoloniaux, en lien avec les patrimoines dits « vivants », qu’il s’agisse de créations contemporaines ou de formes culturelles enracinées dans des traditions — comme les chefferies au Cameroun ou les royaumes d’Aného au Togo.\\n\\nAncienne membre du Collectif Jeune Critique d’Art, elle y a développé une approche critique ancrée dans les pensées post- et décoloniales, interrogeant les récits dominants de l’histoire de l’art et la place des héritages culturels dans les institutions muséales.\\n\\nMembre du collectif Mangrovité, elle a participé à la rédaction de l'ouvrage « Mais le monde est une mangrovité. » en concevant un glossaire. Elle interroge avec le collectif les récits dominants de l’histoire de l’art et la place des héritages culturels.\\n\\n\\nSources :\\n\\nSoustras, Laurence. « Wax: History, Fashion, and Identity – Interview with Cindy Olohou ». Africa on air, 10 mars 2025.\\nhttps://africa-on-air.com/en/culture-en/2025/03/wax-histoire-mode-et-identite-entretien-avec-cindy-olohou/\\n\\nYaci. « Cindy Olohou ». Page consultée le 26 juin 2025.\\nhttps://yaci-international.com/author/cindyolohou/\\n\\nBiennale de l’art africain contemporain. « Cindy Olohou ». Page consultée le 26 juin 2025.\\nhttps://biennaledakar.org/2024/10/28/commissaire-invitee-cindy-olohou/\\n\\nOlohou, Cindy. 2025. Profil LinkedIn. Consulté le 26 juin 2025. https://www.linkedin.com/in/cindy-olohou-522b129a/?originalSubdomain=fr\\n\\nParis international. « Cindy Olohou et Chris Cyrille ». Page consultée le 26 juin 2025.\\nhttps://parisinternationale.com/artfairs/2024/program/cindy-olohu-chris-cyrille\\n\\nOlohou Cindy. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 9 juillet 2024.\",\"translation\":{\"fr\":\"Cindy Olohou est commissaire d’exposition et critique d’art indépendante, spécialiste des scènes contemporaines d’Afrique et de ses diasporas. Depuis 2024, elle est responsable de la collection au Fonds régional d’art contemporain (FRAC) Île-de-France.\\n\\nElle a fondé en 2019 l’agence Wasanii Ya Leo, structure dédiée à la gestion de projets dans le champ de l’art contemporain africain, caribéen et diasporique. Bien que l’agence soit aujourd’hui fermée, elle a constitué un cadre important de réflexion et d’expérimentation curatoriale, nourrissant une pratique engagée et collaborative.\\n\\nCindy Olohou collabore régulièrement avec des institutions telles que le Musée du Quai Branly, le Musée de Lomé ou la Biennale de Dakar, en tant que commissaire indépendante ou consultante, notamment sur les enjeux de création contemporaine, de patrimonialisation et de transmission. Elle s’intéresse particulièrement aux pratiques artistiques issues de contextes postcoloniaux, en lien avec les patrimoines dits « vivants », qu’il s’agisse de créations contemporaines ou de formes culturelles enracinées dans des traditions — comme les chefferies au Cameroun ou les royaumes d’Aného au Togo.\\n\\nAncienne membre du Collectif Jeune Critique d’Art, elle y a développé une approche critique ancrée dans les pensées post- et décoloniales, interrogeant les récits dominants de l’histoire de l’art et la place des héritages culturels dans les institutions muséales.\\n\\nMembre du collectif Mangrovité, elle a participé à la rédaction de l'ouvrage « Mais le monde est une mangrovité. » en concevant un glossaire. Elle interroge avec le collectif les récits dominants de l’histoire de l’art et la place des héritages culturels.\\n\\n\\nSources :\\n\\nSoustras, Laurence. « Wax: History, Fashion, and Identity – Interview with Cindy Olohou ». Africa on air, 10 mars 2025.\\nhttps://africa-on-air.com/en/culture-en/2025/03/wax-histoire-mode-et-identite-entretien-avec-cindy-olohou/\\n\\nYaci. « Cindy Olohou ». Page consultée le 26 juin 2025.\\nhttps://yaci-international.com/author/cindyolohou/\\n\\nBiennale de l’art africain contemporain. « Cindy Olohou ». Page consultée le 26 juin 2025.\\nhttps://biennaledakar.org/2024/10/28/commissaire-invitee-cindy-olohou/\\n\\nOlohou, Cindy. 2025. Profil LinkedIn. Consulté le 26 juin 2025. https://www.linkedin.com/in/cindy-olohou-522b129a/?originalSubdomain=fr\\n\\nParis international. « Cindy Olohou et Chris Cyrille ». Page consultée le 26 juin 2025.\\nhttps://parisinternationale.com/artfairs/2024/program/cindy-olohu-chris-cyrille\\n\\nOlohou Cindy. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 9 juillet 2024.\",\"en\":\"Cindy Olohou is an independent curator and art critic specializing in contemporary African and diaspora art. Since 2024, she has managed the collection at the Fonds régional d’art contemporain (FRAC) Île-de-France.\\nIn 2019, she founded Wasanii Ya Leo, a project management agency dedicated to contemporary African, Caribbean and diasporic art. Although the agency has since closed, it provided an important framework for curatorial reflection and experimentation, fostering an engaged and collaborative practice.\\nCindy Olohou regularly collaborates with institutions such as the Musée du Quai Branly, the Musée de Lomé and the Dakar Biennale as an independent curator and consultant, focusing on contemporary creation, heritage preservation and transmission. She is particularly interested in artistic practices emerging from postcolonial contexts that are linked to “living” heritage. These practices may manifest as contemporary creations or cultural phenomena rooted in traditional societal configurations such as the chiefdoms in Cameroon or the kingdoms of Aného in Togo.\\nAs a former member of the Jeunes critiques d’art collective, she developed a critical approach grounded in postcolonial and decolonial thought. This approach challenges the dominant narratives of art history and the role of cultural heritage in museums.\\nAs a member of the Mangrovité collective, Olohou contributed to a glossary in the book Mais le monde est une mangrovité. Together with the collective, she questions the dominant narratives of art history and the place of cultural heritage.\\n\\nSources consulted: \\n\\nSoustras, Laurence. “Wax: History, Fashion and Identity – Interview with Cindy Olohou.” Africa on air, Accessed March 10, 2025. \\nafrica-on-air.com/en/culture-en/2025/03/wax-histoire-mode-et-identite-entretien-avec-cindy-olohou\\n\\nYaci. “Cindy Olohou.” Accessed June 26, 2025. \\nyaci-international.com/author/cindyolohou\\n\\nBiennale of Contemporary African Art. “Cindy Olohou.” Accessed June 26, 2025. \\nbiennaledakar.org/2024/10/28/commissaire-invitee-cindy-olohou\\n\\nOlohou, Cindy. 2025. LinkedIn profile. Accessed June 26, 2025. linkedin.com/in/cindy-olohou-522b129a/?originalSubdomain=fr\\n\\nParis International. “Cindy Olohou et Chris Cyrille.” Accessed June 26, 2025. \\nparisinternationale.com/artfairs/2024/program/cindy-olohu-chris-cyrille\\n\\nOlohou, Cindy. Interview conducted by Abigail Celis, Célia Mbas and Johanna Montlouis-Gabriel. July 9, 2024.\\n\"}},\"id\":{\"value\":\"P52\"},\"interviewEvents\":{\"value\":[\"The Color Line. Les artistes africains-américains et la ségrégation\",\"Le modèle noir de Géricault à Matisse\"]},\"interviewFavorites\":{\"value\":\"Felwinn Sarr, Afrotopia, 2016 (livre)\\n\\nToute l'oeuvre de Maryse Condé (livres)\\n\\nFrançoise Vergès, Programme de désordre absolu: Décoloniser le musée, 2023 (livre)\\n\\nMarie-Yemta Moussanang, Afrotopiques, 2019, notamment la série sur les modernités africaines (podcast)\\n\\nPierre Haski sur France Inter, Les décolonisations africaines, 2023 (podcast)\\n\\nFestivals et funérailles dans les chefferies de l'Ouest du Cameroun\",\"translation\":{\"fr\":\"Felwinn Sarr, Afrotopia, 2016 (livre)\\n\\nToute l'oeuvre de Maryse Condé (livres)\\n\\nFrançoise Vergès, Programme de désordre absolu: Décoloniser le musée, 2023 (livre)\\n\\nMarie-Yemta Moussanang, Afrotopiques, 2019, notamment la série sur les modernités africaines (podcast)\\n\\nPierre Haski sur France Inter, Les décolonisations africaines, 2023 (podcast)\\n\\nFestivals et funérailles dans les chefferies de l'Ouest du Cameroun\",\"en\":\"Felwinn Sarr. Afrotopia, 2016 (book)\\nThe complete works of Maryse Condé (books)\\nFrançoise Vergès. Programme de désordre absolu : décoloniser le musée, 2023 (book)\\nMarie-Yemta Moussanang. Afrotopiques, 2019 (podcast)\\nPierre Haski on France Inter. Les décolonisations africaines, 2023 (podcast)\"}},\"interviewQuestion\":{\"value\":\"Comment penser un commissariat d'exposition et des lieux d'exposition respectueux, inclusifs et polyphoniques ? \",\"translation\":{\"fr\":\"Comment penser un commissariat d'exposition et des lieux d'exposition respectueux, inclusifs et polyphoniques ? \",\"en\":\"How can we conceive of respectful, inclusive and polyphonic curation practices and exhibition spaces? \\n\\n\"}},\"credits\":{\"value\":\"Vue de l'exposition Rois et reines d'Afrique, figures de pouvoir, 2025, Louvre Abu Dhabi, Abu Dhabi, Emirats Arabes Unis, Crédit photo : Cindy Olohou\",\"translation\":{\"fr\":\"Vue de l'exposition Rois et reines d'Afrique, figures de pouvoir, 2025, Louvre Abu Dhabi, Abu Dhabi, Emirats Arabes Unis, Crédit photo : Cindy Olohou\",\"en\":\"View of the exhibition Rois et reines d'Afrique, figures de pouvoir, 2025, Louvre Abu Dhabi, Abu Dhabi, United Arab Emirates. Photo credit: Cindy Olohou\"}},\"collectives\":{\"value\":[\"Wasanii Ya Leo\",\"Jeunes Critiques d'Art\",\"Mangrovité\"],\"mutiple\":true}},{\"name\":{\"value\":\"Willina\"},\"surname\":{\"value\":\"Sossou\"},\"roles\":{\"value\":[\"Designer\",\"Artiste\",\"Directeur.rice artistique\"],\"translation\":{\"fr\":[\"Designer\",\"Artiste\",\"Directeur.rice artistique\"],\"en\":[\"Artist\",\"Curator\",\"Designer\"]}},\"activities\":{\"value\":[\"design\",\"curation\",\"pratique collective\"],\"translation\":{\"fr\":[\"design\",\"curation\",\"pratique collective\"],\"en\":[\"design\",\"curation\",\"collective practice\"]}},\"birthYear\":{\"value\":\"1997-01-01T00:00:00.000Z\"},\"citiesOfActivity\":{\"value\":[\"Paris\"]},\"placesOfFormation\":{\"value\":[\"École Boulle\",\"Mobilier national\"]},\"link\":{\"value\":\"https://www.weareahome.com/willina\"},\"biography\":{\"value\":\"Willina Sossou est une designer d’objets et une designer graphique. Elle est fondatrice du studio de design AHOMÉ, « la maison » en langue Mina (parlée au Bénin et au Togo),  qui accompagne des créatifs.ves porteurs.euses de projets qui souhaitent apporter un héritage africain à leurs réalisations.\\n\\nLe sujet de la transmission est central dans sa démarche. À travers ses recherches, Willina Sossou souhaite faire face à l’absence de figures noires en design parmi les références mises en avant en Europe et plus largement en Occident. Elle pousse ainsi les frontières coloniales du design et explore son pouvoir narratif. En parallèle de son travail de designer, elle accompagne le rayonnement culturel des créatif·ves de la diaspora africaine à travers des interventions ponctuelles — médiation, programmation, commissariat d'exposition — menées dans divers lieux culturels, dont l’Union de la Jeunesse Internationale à Paris.\\n\\nAvec ses pratiques de direction artistique, de branding et de recherche, Willina Soussou crée sa propre arborescence de références sur lesquelles elle prend ancrage, et qu’elle partage avec son réseau.\\n\\nElle poursuit son engagement et sa transmission en créant en 2023 We Are Ahomé, conçu à la fois comme un projet associatif et un réseau. We Are Ahomé « donne la voix aux créateurs et designers issus du continent africain, des Caraïbes, de l'océan Indien et de leurs diasporas » et permet d’initier des collaborations. Ce réseau répond à un besoin de se raconter, de s’entraider et de faire communauté.\\n\\nSources :\\n\\nAfrokidekor. « Willina, designer afropéenne et curatrice ». Page consultée le 30 juin 2025. https://afrokidekor.com/design/designer-et-curatrice-afropeenne/\\n\\nAhomé. «The design studio ». Page consultée le 30 juin 2025. https://www.weareahome.com/about\\n\\nWe are Ahomé. « Le projet WAA ». Page consultée le 30 juin 2025. https://weareahome.notion.site/we-are-ahom-ccae4c32dbc5487ab79f526ab6aaa181\\n\\nSossou, Willina. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 1er juillet 2024.\",\"translation\":{\"fr\":\"Willina Sossou est une designer d’objets et une designer graphique. Elle est fondatrice du studio de design AHOMÉ, « la maison » en langue Mina (parlée au Bénin et au Togo),  qui accompagne des créatifs.ves porteurs.euses de projets qui souhaitent apporter un héritage africain à leurs réalisations.\\n\\nLe sujet de la transmission est central dans sa démarche. À travers ses recherches, Willina Sossou souhaite faire face à l’absence de figures noires en design parmi les références mises en avant en Europe et plus largement en Occident. Elle pousse ainsi les frontières coloniales du design et explore son pouvoir narratif. En parallèle de son travail de designer, elle accompagne le rayonnement culturel des créatif·ves de la diaspora africaine à travers des interventions ponctuelles — médiation, programmation, commissariat d'exposition — menées dans divers lieux culturels, dont l’Union de la Jeunesse Internationale à Paris.\\n\\nAvec ses pratiques de direction artistique, de branding et de recherche, Willina Soussou crée sa propre arborescence de références sur lesquelles elle prend ancrage, et qu’elle partage avec son réseau.\\n\\nElle poursuit son engagement et sa transmission en créant en 2023 We Are Ahomé, conçu à la fois comme un projet associatif et un réseau. We Are Ahomé « donne la voix aux créateurs et designers issus du continent africain, des Caraïbes, de l'océan Indien et de leurs diasporas » et permet d’initier des collaborations. Ce réseau répond à un besoin de se raconter, de s’entraider et de faire communauté.\\n\\nSources :\\n\\nAfrokidekor. « Willina, designer afropéenne et curatrice ». Page consultée le 30 juin 2025. https://afrokidekor.com/design/designer-et-curatrice-afropeenne/\\n\\nAhomé. «The design studio ». Page consultée le 30 juin 2025. https://www.weareahome.com/about\\n\\nWe are Ahomé. « Le projet WAA ». Page consultée le 30 juin 2025. https://weareahome.notion.site/we-are-ahom-ccae4c32dbc5487ab79f526ab6aaa181\\n\\nSossou, Willina. Entrevue menée par Abigail Celis, Célia Mbas et Johanna Montlouis-Gabriel. 1er juillet 2024.\",\"en\":\"Willina Sossou is an object and graphic designer. She founded the design studio AHOMÉ, which means “the house” in the Mina language, spoken in Benin and Togo. AHOMÉ supports creatives seeking to incorporate African heritage into their work.\\nThe theme of transmission is central to her practice. Through her research, Sossou addresses the absence of Black figures in European and Western design references. In doing so, she challenges the colonial boundaries of design and explores the narrative power of design.\\nAlongside her work as a designer, Sossou promotes the cultural influence of creatives from the African diaspora through mediation, programming and exhibition, curating at venues such as the Union de la Jeunesse Internationale in Paris.\\nThrough artistic direction, branding and research, she has developed a distinctive tree of references that serves as both her foundation and a resource she shares with her network.\\nIn 2023, Sossou expanded her reach and transmission by creating We Are Ahomé, designed as both an associative project and a network. We Are Ahomé brings together African, Creole and diaspora creatives and designers. The network fosters collaborations, storytelling, mutual support and community building.\\n\\nSources consulted: \\n\\nAfrokidekor. “Willina, designer afropéenne et curatrice.″ Accessed June 30, 2025. \\nafrokidekor.com/design/designer-et-curatrice-afropeenne.\\n\\nAhomé. “The design studio.” Accessed June 30, 2025. weareahome.com/about\"}},\"id\":{\"value\":\"P50\"},\"interviewEvents\":{\"value\":[\"Transmission(s)\",\"PALABRES\",\"NOIRES\"]},\"interviewFavorites\":{\"value\":\"Africando, Doni Doni, 2000 (musique)\\n\\nDjibril Diop Mambéty, Hyènes, 1993 (film)\\n\\nZephir Dimitri, Les mailles fertiles d’un créole, 2015 (mémoire de fin d’études, École nationale supérieure des Arts Décoratifs, Paris)\",\"translation\":{\"fr\":\"Africando, Doni Doni, 2000 (musique)\\n\\nDjibril Diop Mambéty, Hyènes, 1993 (film)\\n\\nZephir Dimitri, Les mailles fertiles d’un créole, 2015 (mémoire de fin d’études, École nationale supérieure des Arts Décoratifs, Paris)\",\"en\":\"Africando. “Doni Doni”, 2000 (song)\\n\\nDjibril Diop Mambéty. Hyènes, 1993 (film)\\n\\nDimitri Zephir. Les mailles fertiles d’un créole, 2015 (final thesis, École nationale supérieure des arts décoratifs, Paris)\"}},\"interviewQuestion\":{\"value\":\"Et si nos quotidiens afrodescendants, dans leur infra-ordinaire, devenaient sources de projets ?\",\"translation\":{\"fr\":\"Et si nos quotidiens afrodescendants, dans leur infra-ordinaire, devenaient sources de projets ?\",\"en\":\"What if our projects were nourished by our everyday lives as people of African descent, in their infraordinary nature?\\n\\n\"}},\"credits\":{\"value\":\"À gauche, photographie d'un atelier réalisé à l'Union de la Jeunesse Internationale, 2025.\\nÀ droite, Chaise Guiche, modélisation 3D d'un des mobiliers du projet de recherche Onidiri, 2025.\\n\",\"translation\":{\"fr\":\"À gauche, photographie d'un atelier réalisé à l'Union de la Jeunesse Internationale, 2025.\\nÀ droite, Chaise Guiche, modélisation 3D d'un des mobiliers du projet de recherche Onidiri, 2025.\\n\",\"en\":\"L: View of workshop run by the Union de la Jeunesse Internationale, 2025.\\nR: Chaise Guiche, a 3D model of furniture from the research project Onidiri, 2025.\\n\"}},\"collectives\":{\"value\":[\"We are Ahomé\"],\"mutiple\":true}}],\"events\":[{\"title\":{\"value\":\"Tituba, qui pour nous protéger?\"},\"types\":{\"value\":[\"Exposition collective\"],\"translation\":{\"fr\":[\"Exposition collective\"],\"en\":[\"Temporary exhibition\",\"Group show\"]}},\"locations\":{\"value\":[\"Palais de Tokyo\"]},\"cities\":{\"val Filles de Blédards rassemble de jeunes artistes français·es enfants d’immigré·es, dans l’idée de porter des voix encore minoritaires dans le champ de l’art et de la culture. Le collectif, encore actif, organise une programmation et de nombreux événements festifs entre Paris, Marseille et Saint-Denis.\",\"translation\":{\"fr\":\"Lancé par Alexia Fiasco et Mariam Saint-Denis en 2018, le collectif Filles de Blédards rassemble de jeunes artistes français·es enfants d’immigré·es, dans l’idée de porter des voix encore minoritaires dans le champ de l’art et de la culture. Le collectif, encore actif, organise une programmation et de nombreux événements festifs entre Paris, Marseille et Saint-Denis.\",\"en\":\"Founded by Alexia Fiasco and Mariam Saint-Denis in 2018, the Filles de Blédards collective brings together young, second-generation immigrant artists in France. Still active, the collective organizes events and festivities in Paris, Marseille and Saint-Denis to give this minority group a voice within the arts and culture scene.\"}},\"status\":{\"value\":[\"Collectif\"],\"translation\":{\"fr\":[\"Collectif\"],\"en\":[\"Collective\"]}},\"inceptionDate\":{\"value\":\"2018-01-01T00:00:00.000Z\"},\"dissolutionDate\":{\"value\":null},\"members\":{\"value\":[\"Alexia \"]}},{\"name\":{\"value\":\"Cases Rebelles\"},\"description\":{\"value\":null,\"translation\":{\"fr\":null,\"en\":null}},\"status\":{\"value\":[\"Collectif\",\"Comité éditorial\"],\"translation\":{\"fr\":[\"Collectif\",\"Comité éditorial\"],\"en\":[\"Collective\",\"Editorial committee\"]}},\"inceptionDate\":{\"value\":null},\"dissolutionDate\":{\"value\":null},\"members\":{\"value\":[]}},{\"name\":{\"value\":\"Wasanii Ya Leo\"},\"description\":{\"value\":\"Entrepris en 2018 par Cindy Olohou, qui fut rejointe par Ana Sonderéguer, Wasanii Ya Leo, swahili pour « artistes d’aujourd’hui », a pour initiative de promouvoir la diffusion d’objets d’art contemporain d’Afrique, d’Amérique latine et de leurs diasporas. L’agence offre une expertise et un accompagnement, servant d’intermédiaire dans la médiatisation de différents acteurs de l’art issus de ces diversités.\",\"translation\":{\"fr\":\"Entrepris en 2018 par Cindy Olohou, qui fut rejointe par Ana Sonderéguer, Wasanii Ya Leo, swahili pour « artistes d’aujourd’hui », a pour initiative de promouvoir la diffusion d’objets d’art contemporain d’Afrique, d’Amérique latine et de leurs diasporas. L’agence offre une expertise et un accompagnement, servant d’intermédiaire dans la médiatisation de différents acteurs de l’art issus de ces diversités.\",\"en\":\"Launched in 2018 by Cindy Olohou, and later joined by Ana Sonderéguer, Wasanii Ya Leo—Swahili for “artists of today”—is an initiative to promote the dissemination of contemporary art from Africa, Latin America and their diasporas. The agency provides expertise and support, acting as an intermediary for media coverage of artists and creatives from these diverse backgrounds.\"}},\"status\":{\"value\":[\"Collectif\"],\"translation\":{\"fr\":[\"Collectif\"],\"en\":[\"Collective\"]}},\"inceptionDate\":{\"value\":\"2018-01-01T00:00:00.000Z\"},\"dissolutionDate\":{\"value\":\"2026-01-02T00:00:00.000Z\"},\"members\":{\"value\":[\"Cindy\"]}},{\"name\":{\"value\":\"SMAC Collectif\"},\"description\":{\"value\":null,\"translation\":{\"fr\":null,\"en\":null}},\"status\":{\"value\":[\"Collectif\"],\"translation\":{\"fr\":[\"Collectif\"],\"en\":[\"Collective\"]}},\"inceptionDate\":{\"value\":null},\"dissolutionDate\":{\"value\":null},\"members\":{\"value\":[\"Audrey\"]}},{\"name\":{\"value\":\"NMT\"},\"description\":{\"value\":\"Actif de 2017 à 2019 à Paris, à l’initiative d’Amandine Nana, rejointe par Mariama Conteh, Carla Genus, Myriam Rabah-Konaté et d’autres, le collectif NMT programmait des événements culturels mettant en avant des artistes issus des diasporas. Inspiré par des initiatives comme Rookie Magazine ou Art Hoe Collective, le collectif relayait le travail de jeunes artistes sur son site Internet. \",\"translation\":{\"fr\":\"Actif de 2017 à 2019 à Paris, à l’initiative d’Amandine Nana, rejointe par Mariama Conteh, Carla Genus, Myriam Rabah-Konaté et d’autres, le collectif NMT programmait des événements culturels mettant en avant des artistes issus des diasporas. Inspiré par des initiatives comme Rookie Magazine ou Art Hoe Collective, le collectif relayait le travail de jeunes artistes sur son site Internet. \",\"en\":\"The Paris-based NMT collective, which was active from 2017 to 2019, curated cultural events highlighting artists from diaspora communities. Amandine Nana founded the collective, which was later joined by Mariama Conteh, Carla Genus, Myriam Rabah-Konaté and others. Inspired by initiatives such as Rookie Magazine and the Art Hoe Collective, NMT promoted the work of emerging artists on its website. \"}},\"status\":{\"value\":[\"Collectif\"],\"translation\":{\"fr\":[\"Collectif\"],\"en\":[\"Collective\"]}},\"inceptionDate\":{\"value\":\"2017-01-01T00:00:00.000Z\"},\"dissolutionDate\":{\"value\":\"2019-01-01T00:00:00.000Z\"},\"members\":{\"value\":[\"Carla\",\"Amandine \",\"Mariama\",\"Carla\",\"Myriam\",\"Heryte\"]}},{\"name\":{\"value\":\"Maestra Les Fauvettes\"},\"description\":{\"value\":\"Association structurée en 2021 pour accompagner les habitant·es de la cité des Fauvettes à Pierrefitte à la suite de la destruction programmée de leurs habitations. L’association, implantée en Seine-Saint-Denis, propose un lien au quotidien et une programmation culturelle aux habitant·es – activités artistiques, spectacles, expositions – comme autant d’outils pour s’approprier leurs récits et les raconter.\",\"translation\":{\"fr\":\"Association structurée en 2021 pour accompagner les habitant·es de la cité des Fauvettes à Pierrefitte à la suite de la destruction programmée de leurs habitations. L’association, implantée en Seine-Saint-Denis, propose un lien au quotidien et une programmation culturelle aux habitant·es – activités artistiques, spectacles, expositions – comme autant d’outils pour s’approprier leurs récits et les raconter.\",\"en\":\"Founded in 2021 by and for the residents of the Cité des Fauvettes in Pierrefitte, Seine-Saint-Denis, the association Maestra emerged in response to the planned demolition of their housing complex. Maestra offers residents ways to stay connected, as well as an extensive cultural program featuring artistic activities, performances and exhibitions to empower residents to reclaim and tell their own stories.\"}},\"status\":{\"value\":[\"Association loi 1901\"],\"translation\":{\"fr\":[\"Association loi 1901\"],\"en\":[\"Association law 1901\"]}},\"inceptionDate\":{\"value\":\"2021-01-01T00:00:00.000Z\"},\"dissolutionDate\":{\"value\":null},\"members\":{\"value\":[\"Alexia \"]}},{\"name\":{\"value\":\"We are Ahomé\"},\"description\":{\"value\":\"We Are Ahomé est un collectif d’acteur·rices culturel·les qui vise à bâtir un espace d’éducation, de partage et d’entraide, où chacun·e se sent « chez soi », afin de se raconter. Il favorise les collaborations entre les créatif·ves du continent africain, des Caraïbes, de l’océan Indien et de leurs diasporas.\",\"translation\":{\"fr\":\"We Are Ahomé est un collectif d’acteur·rices culturel·les qui vise à bâtir un espace d’éducation, de partage et d’entraide, où chacun·e se sent « chez soi », afin de se raconter. Il favorise les collaborations entre les créatif·ves du continent africain, des Caraïbes, de l’océan Indien et de leurs diasporas.\",\"en\":\"We Are Ahomé is a collective of cultural figures that provides a space for education, sharing and mutual aid, where everyone feels “at home” and can tell their story. It promotes collaboration between creatives from Africa, the Caribbean, the Indian Ocean and their diasporas.\"}},\"status\":{\"value\":[\"Collectif\"],\"translation\":{\"fr\":[\"Collectif\"],\"en\":[\"Collective\"]}},\"inceptionDate\":{\"value\":\"2023-01-01T00:00:00.000Z\"},\"dissolutionDate\":{\"value\":null},\"members\":{\"value\":[\"Willina\"]}},{\"name\":{\"value\":\"Afrikadaa\"},\"description\":{\"value\":\"L’association a pour objectif de promouvoir et de structurer l’art et les artistes africains ou en lien avec l’Afrique et ses diasporas. Par diverses pédagogies événementielles et culturelles, le collectif propose de nouvelles façons de théoriser sur l’art, en accompagnant de nouvelles pratiques artistiques et en favorisant une transmission éducative dans les quartiers populaires.\",\"translation\":{\"fr\":\"L’association a pour objectif de promouvoir et de structurer l’art et les artistes africains ou en lien avec l’Afrique et ses diasporas. Par diverses pédagogies événementielles et culturelles, le collectif propose de nouvelles façons de théoriser sur l’art, en accompagnant de nouvelles pratiques artistiques et en favorisant une transmission éducative dans les quartiers populaires.\",\"en\":\"Afrikadaa aims to promote and develop art and artists from Africa and its diasporas. Through various educational, event-based and cultural initiatives, the collective offers fresh theoretical approaches to art, supports emerging artistic practices and fosters educational outreach in working-class neighbourhoods.\"}},\"status\":{\"value\":[\"Association loi 1901\",\"Comité éditorial\",\"Collectif\"],\"translation\":{\"fr\":[\"Association loi 1901\",\"Comité éditorial\",\"Collectif\"],\"en\":[\"Association law 1901\",\"Editorial committee\"]}},\"inceptionDate\":{\"value\":\"2012-01-01T00:00:00.000Z\"},\"dissolutionDate\":{\"value\":null},\"members\":{\"value\":[\"Pascale\"]}},{\"name\":{\"value\":\"On Trade Off\"},\"description\":{\"value\":\"On-Trade-Off est un collectif international créé à l’initiative de Picha, un laboratoire artistique à Lubumbashi (RDC), et Enough Room for Space (ERforS), un incubateur artistique indépendant. Il prend comme point de départ la ruée vers le lithium de la RDC pour enquêter sur les liens entre extraction des matières premières pour les industries technologiques, spéculation financière, histoire de l’électricité et histoire coloniale.\",\"translation\":{\"fr\":\"On-Trade-Off est un collectif international créé à l’initiative de Picha, un laboratoire artistique à Lubumbashi (RDC), et Enough Room for Space (ERforS), un incubateur artistique indépendant. Il prend comme point de départ la ruée vers le lithium de la RDC pour enquêter sur les liens entre extraction des matières premières pour les industries technologiques, spéculation financière, histoire de l’électricité et histoire coloniale.\",\"en\":\"One-Trade-Off is an international collective founded by Picha, an artistic laboratory in Lubumbashi (Democratic Republic of the Congo), and Enough Room for Space (ERforS), an independent artistic incubator. Taking the Democratic Republic of the Congo’s lithium rush as a starting point, it investigates the links between raw materials extraction for technology, financial speculation and the histories of electricity and colonialism.\"}},\"status\":{\"value\":[\"Collectif\"],\"translation\":{\"fr\":[\"Collectif\"],\"en\":[\"Collective\"]}},\"inceptionDate\":{\"value\":\"2018-01-01T00:00:00.000Z\"},\"dissolutionDate\":{\"value\":\"2024-01-01T00:00:00.000Z\"},\"members\":{\"value\":[\"Oulimata\"]}},{\"name\":{\"value\":\"Air Afrique\"},\"description\":{\"value\":null,\"translation\":{\"fr\":null,\"en\":null}},\"status\":{\"value\":[\"Comité éditorial\"],\"translation\":{\"fr\":[\"Comité éditorial\"],\"en\":[\"Editorial committee\"]}},\"inceptionDate\":{\"value\":null},\"dissolutionDate\":{\"value\":null},\"members\":{\"value\":[\"Djiby \",\"Amandine \"]}},{\"name\":{\"value\":\"Jeunes Critiques d'Art\"},\"description\":{\"value\":\"Fondée en 2016 comme une branche de l’organisation Young Art Critic International, Jeunes critiques d’art rallie des critiques de multiples horizons sous la vision d’une étude réflexive des pratiques contemporaines du milieu artistique mondial. Le collectif valorise la liberté de rédaction et le volontarisme dans ses échanges sur divers sujets culturels.\",\"translation\":{\"fr\":\"Fondée en 2016 comme une branche de l’organisation Young Art Critic International, Jeunes critiques d’art rallie des critiques de multiples horizons sous la vision d’une étude réflexive des pratiques contemporaines du milieu artistique mondial. Le collectif valorise la liberté de rédaction et le volontarisme dans ses échanges sur divers sujets culturels.\",\"en\":\"Founded in 2016 as a branch of Young Art Critic International, Jeunes critiques d’art unites critics from diverse backgrounds to promote reflection on contemporary practices in the global art world. The collective values editorial freedom and proactivity in discussions about various cultural topics. \"}},\"status\":{\"value\":[\"Collectif\"],\"translation\":{\"fr\":[\"Collectif\"],\"en\":[\"Collective\"]}},\"inceptionDate\":{\"value\":\"2016-01-01T00:00:00.000Z\"},\"dissolutionDate\":{\"value\":null},\"members\":{\"value\":[\"Cindy\"]}},{\"name\":{\"value\":\"Mwasi\"},\"description\":{\"value\":\"Mwasi est un collectif afroféministe créé en 2014 à Paris qui s’inscrit dans les luttes révolutionnaires de libération. Son afroféminisme est une réponse politique et collective au système raciste, hétéropatriarcal et capitaliste, dans la lignée des femmes et féministes noires ayant mené des luttes pour leur émancipation et leur libération.\",\"translation\":{\"fr\":\"Mwasi est un collectif afroféministe créé en 2014 à Paris qui s’inscrit dans les luttes révolutionnaires de libération. Son afroféminisme est une réponse politique et collective au système raciste, hétéropatriarcal et capitaliste, dans la lignée des femmes et féministes noires ayant mené des luttes pour leur émancipation et leur libération.\",\"en\":\"Founded in Paris in 2014, Mwasi is an Afrofeminist collective that considers itself part of the broader revolutionary struggle for liberation. Its Afrofeminism is a political and collective response to racist, heteropatriarchal and capitalist systems and draws on the history and legacy of Black women and feminists who have fought for emancipation and liberation.\\n\"}},\"status\":{\"value\":[\"Collectif\",\"Association loi 1901\"],\"translation\":{\"fr\":[\"Collectif\",\"Association loi 1901\"],\"en\":[\"Collective\",\"Association law 1901\"]}},\"inceptionDate\":{\"value\":\"2014-01-01T00:00:00.000Z\"},\"dissolutionDate\":{\"value\":null},\"members\":{\"value\":[\"Marie-Julie\"]}},{\"name\":{\"value\":\"Hall Haus\"},\"description\":{\"value\":null,\"translation\":{\"fr\":null,\"en\":null}},\"status\":{\"value\":[\"Collectif\"],\"translation\":{\"fr\":[\"Collectif\"],\"en\":[\"Collective\"]}},\"inceptionDate\":{\"value\":null},\"dissolutionDate\":{\"value\":null},\"members\":{\"value\":[\"Abdoulaye\"]}},{\"name\":{\"value\":\"Mangrovité\"},\"description\":{\"value\":\"Le collectif Mangrovité a été fondé dans une démarche de réflexion sur les humanités et de création de ponts entre les disciplines, les héritages culturels et les avenirs. À travers des publications, balados, rencontres et expositions, et depuis les champs de la culture et de l’esthétique, Mangrovité imagine les paysages français de la culture dans une perspective de solidarité diasporique.\",\"translation\":{\"fr\":\"Le collectif Mangrovité a été fondé dans une démarche de réflexion sur les humanités et de création de ponts entre les disciplines, les héritages culturels et les avenirs. À travers des publications, balados, rencontres et expositions, et depuis les champs de la culture et de l’esthétique, Mangrovité imagine les paysages français de la culture dans une perspective de solidarité diasporique.\",\"en\":\"The Mangrovité collective was founded with the aim of fostering reflection on the humanities and building bridges between disciplines, cultural heritage and the future. Through publications, podcasts, meetings and exhibitions in the cultural sector, Mangrovité envisions the French cultural lan
